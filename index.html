<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F8FAFC; color: #1e293b; }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 100, 255, 0.06); }
        .pix-btn { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .team-logo { width: 32px; height: 32px; object-fit: contain; }
        
        /* Estilo do Calendário */
        .date-item.active { color: #ef4444; border-bottom: 3px solid #ef4444; }
        
        /* Detalhes do Jogo */
        #game-details { display: none; position: fixed; inset: 0; background: #F8FAFC; z-index: 100; overflow-y: auto; }
        #auth-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 200; backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="pb-32">

    <div id="main-content">
        <header class="bg-white p-6 sticky top-0 z-50 border-b border-slate-50 flex justify-between items-center shadow-sm">
            <div class="flex flex-col">
                <h1 class="text-xl font-black italic text-slate-900 uppercase leading-none">Palpite<span class="text-sky-500">Bet</span></h1>
                <p class="text-[8px] font-black text-sky-400 uppercase tracking-widest mt-1 italic">ESTATÍSTICAS & VIP</p>
            </div>
            <a href="https://pay.kiwify.com.br/mj9n838" class="pix-btn text-white px-4 py-2 rounded-xl text-[9px] font-black shadow-lg uppercase">Acesso VIP</a>
        </header>

        <section class="p-5">
            <div class="bg-white rounded-[30px] p-6 border border-sky-50 card-shadow">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-3 italic">🔎 Scanner de Bilhetes AI</h3>
                <div class="flex gap-2">
                    <input id="ticketInput" type="text" placeholder="Cole o código da aposta..." class="flex-1 bg-slate-50 border border-slate-100 p-3 rounded-xl text-[10px] font-bold outline-none">
                    <button onclick="checkAuth('analisar')" class="bg-slate-900 text-white px-4 rounded-xl font-black text-[9px] uppercase tracking-tighter">Analisar</button>
                </div>
            </div>
        </section>

        <nav class="bg-white border-y border-slate-50 overflow-x-auto no-scrollbar flex justify-between px-4">
            <div class="date-item flex flex-col items-center py-3 px-3 text-slate-400">
                <span class="text-[8px] font-bold uppercase">Ter</span>
                <span class="text-[11px] font-black">07.04.</span>
            </div>
            <div class="date-item flex flex-col items-center py-3 px-3 text-slate-400">
                <span class="text-[8px] font-bold uppercase">Qua</span>
                <span class="text-[11px] font-black">08.04.</span>
            </div>
            <div class="date-item active flex flex-col items-center py-3 px-3">
                <span class="text-[8px] font-bold uppercase text-red-500 italic">Hoje</span>
                <span class="text-[11px] font-black">09.04.</span>
            </div>
            <div class="date-item flex flex-col items-center py-3 px-3 text-slate-400">
                <span class="text-[8px] font-bold uppercase">Sex</span>
                <span class="text-[11px] font-black">10.04.</span>
            </div>
            <div class="date-item flex flex-col items-center py-3 px-3 text-slate-400">
                <span class="text-[8px] font-bold uppercase">Sáb</span>
                <span class="text-[11px] font-black">11.04.</span>
            </div>
        </nav>

        <div class="flex gap-3 p-5 overflow-x-auto no-scrollbar">
            <button class="bg-sky-500 text-white text-[9px] font-black uppercase px-5 py-2 rounded-full shadow-md">⚽ Futebol</button>
            <button class="bg-white text-slate-400 border border-slate-100 text-[9px] font-black uppercase px-5 py-2 rounded-full">🏀 NBA</button>
            <button class="bg-white text-slate-400 border border-slate-100 text-[9px] font-black uppercase px-5 py-2 rounded-full">🎾 Tênis</button>
        </div>

        <main class="px-5 space-y-6" id="games-feed">
            </main>
    </div>

    <div id="game-details">
        <div class="bg-slate-900 text-white p-5 flex items-center gap-4">
            <button onclick="closeDetails()" class="text-2xl font-bold">←</button>
            <span id="det-league" class="text-[10px] font-black uppercase tracking-widest"></span>
        </div>
        <div class="bg-white p-8 flex justify-between items-center border-b border-slate-100 shadow-sm">
            <div class="flex flex-col items-center gap-2 flex-1"><img id="det-logo-h" src="" class="team-logo"><span id="det-name-h" class="text-[10px] font-black uppercase mt-1"></span></div>
            <div class="text-center flex-1 font-black text-2xl italic">VS</div>
            <div class="flex flex-col items-center gap-2 flex-1"><img id="det-logo-a" src="" class="team-logo"><span id="det-name-a" class="text-[10px] font-black uppercase mt-1"></span></div>
        </div>
        <div class="p-6 space-y-4" id="det-markets"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-4 z-50 rounded-t-[30px] shadow-2xl">
        <button class="flex flex-col items-center gap-1 text-red-500 font-black text-[8px] uppercase">
            <span class="text-xl">🏠</span>Hoje
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-300 font-black text-[8px] uppercase">
            <span class="text-xl">📡</span>Ao Vivo
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-300 font-black text-[8px] uppercase">
            <span class="text-xl">⭐</span>Favoritos
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-300 font-black text-[8px] uppercase">
            <span class="text-xl">🏆</span>Ligas
        </button>
    </nav>

    <div id="auth-modal">
        <div class="bg-white w-full max-w-xs rounded-[35px] p-8 text-center shadow-2xl">
            <h4 class="text-lg font-black text-slate-900 uppercase italic">PalpiteBet Login</h4>
            <p class="text-[9px] text-slate-400 font-bold mb-6">Cadastre-se para liberar as análises.</p>
            <div class="space-y-3">
                <input type="text" id="regName" placeholder="Nome" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-[10px] font-bold outline-none">
                <input type="email" id="regEmail" placeholder="E-mail" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-[10px] font-bold outline-none">
                <button onclick="saveUser()" class="w-full pix-btn text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg">Criar Acesso Grátis</button>
            </div>
        </div>
    </div>

    <script>
        let userIsLogged = false;
        const getLogo = (name) => `https://www.google.com/s2/favicons?domain=${name.toLowerCase().replace(/ /g, '')}.com&sz=128`;

        // DADOS AGRUPADOS POR LIGA (Igual ao print favorito)
        const leagues = [
            {
                name: "Copa Libertadores",
                icon: "🌎",
                games: [
                    { id: 1, h: "Flamengo", a: "Palestino", o: "1.25", markets: [{title: "🚩 ESCANTEIOS", desc: "Mais 9.5", o: "1.80"}] },
                    { id: 2, h: "Atlético-MG", a: "Rosario Central", o: "1.60", markets: [{title: "🚩 ESCANTEIOS", desc: "Mais 8.5", o: "1.75"}] }
                ]
            },
            {
                name: "Champions League",
                icon: "🇪🇺",
                games: [
                    { id: 3, h: "Real Madrid", a: "Man City", o: "2.10", markets: [{title: "🎯 CHUTES AO GOL", desc: "Mais 5.5", o: "1.90"}] }
                ]
            }
        ];

        function renderLeagues() {
            document.getElementById('games-feed').innerHTML = leagues.map(league => `
                <div class="space-y-3">
                    <div class="bg-slate-100/50 p-3 rounded-xl flex items-center gap-3 border-l-4 border-sky-500">
                        <span class="text-xs">${league.icon}</span>
                        <span class="text-[9px] font-black uppercase text-slate-500 tracking-wider">${league.name}</span>
                    </div>
                    
                    <div class="space-y-3">
                        ${league.games.map(g => `
                            <div onclick="openDetails(${g.id})" class="bg-white rounded-3xl p-5 border border-slate-50 shadow-sm flex items-center justify-between active:scale-95 transition-all">
                                <div class="flex flex-col gap-3 flex-1">
                                    <div class="flex items-center gap-3">
                                        <img src="${getLogo(g.h)}" class="team-logo">
                                        <span class="text-[10px] font-black uppercase text-slate-700">${g.h}</span>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <img src="${getLogo(g.a)}" class="team-logo">
                                        <span class="text-[10px] font-black uppercase text-slate-700">${g.a}</span>
                                    </div>
                                </div>
                                <div class="bg-sky-50 px-4 py-2 rounded-2xl text-center min-w-[60px]">
                                    <p class="text-[7px] text-sky-400 font-bold uppercase">Sugestão</p>
                                    <p class="text-[11px] font-black text-sky-600">@${g.o}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function checkAuth(action) {
            if(!userIsLogged) { document.getElementById('auth-modal').style.display = 'flex'; return; }
            if(action === 'analisar') alert("Bilhete analisado!");
        }

        function saveUser() {
            if(!document.getElementById('regName').value) return;
            userIsLogged = true;
            document.getElementById('auth-modal').style.display = 'none';
            renderLeagues();
        }

        function openDetails(id) {
            if(!userIsLogged) return checkAuth();
            let g;
            leagues.forEach(l => { const found = l.games.find(item => item.id === id); if(found) g = found; });
            
            document.getElementById('det-name-h').innerText = g.h;
            document.getElementById('det-name-a').innerText = g.a;
            document.getElementById('det-logo-h').src = getLogo(g.h);
            document.getElementById('det-logo-a').src = getLogo(g.a);
            document.getElementById('det-markets').innerHTML = g.markets.map(mark => `
                <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                    <div><p class="text-[8px] text-sky-500 font-black uppercase mb-1">${mark.title}</p><p class="text-[10px] font-black uppercase">${mark.desc}</p></div>
                    <div class="text-xl font-black text-slate-900">@${mark.o}</div>
                </div>
            `).join('') + `<a href="https://pay.kiwify.com.br/mj9n838" class="block w-full bg-slate-900 text-white text-center py-5 rounded-[25px] font-black uppercase text-[9px] mt-4">Ver Grade VIP Completa</a>`;
            
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('game-details').style.display = 'block';
        }

        function closeDetails() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('game-details').style.display = 'none';
        }

        renderLeagues();
    </script>
</body>
</html>
