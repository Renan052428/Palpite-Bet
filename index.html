<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 pb-24">

    <header class="bg-gradient-to-r from-pink-600 to-purple-700 text-white p-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">PalpiteBet</h1>
            <div class="flex gap-4"><span>🔍</span><span class="bg-white/20 p-1 rounded-full">👤</span></div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="flex justify-between items-center px-1">
            <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Palpites da IA (Hoje)</h3>
            <span class="text-[10px] text-green-500 font-bold animate-pulse">● LIVE DATA</span>
        </div>

        <div id="ai-predictions" class="space-y-4">
            <div class="animate-pulse bg-white h-32 rounded-[32px]"></div>
        </div>

        <button onclick="openResults()" class="w-full bg-slate-800 text-white p-5 rounded-[24px] flex justify-between items-center shadow-xl">
            <div class="flex items-center gap-3">
                <span class="text-2xl">📡</span>
                <div class="text-left">
                    <p class="font-bold text-sm text-pink-500 uppercase">Placar ao Vivo</p>
                    <p class="text-[10px] opacity-60">Ver todos os jogos em tempo real</p>
                </div>
            </div>
            <span class="bg-white/10 p-2 rounded-full">➜</span>
        </button>
    </main>

    <div id="resultsModal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeResults()"></div>
        <div class="absolute bottom-0 left-0 right-0 h-[90vh] glass rounded-t-[40px] shadow-2xl flex flex-col">
            <div class="p-4 flex justify-center">
                <div class="w-12 h-1.5 bg-slate-300 rounded-full" onclick="closeResults()"></div>
            </div>
            <div class="flex justify-between items-center px-6 mb-2">
                <h2 class="font-bold text-slate-800">Resultados Online</h2>
                <button onclick="closeResults()" class="text-slate-400 font-bold">Fechar</button>
            </div>
            <iframe src="https://m.flashscore.com.br/" class="w-full flex-1 border-none"></iframe>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-4 z-50 shadow-2xl">
        <div class="flex flex-col items-center text-pink-600"><span class="text-2xl">🏠</span><span class="text-[9px] font-bold uppercase">Home</span></div>
        <div onclick="openResults()" class="flex flex-col items-center text-slate-300"><span class="text-2xl">📡</span><span class="text-[9px] font-bold uppercase">Live</span></div>
        <div class="flex flex-col items-center text-slate-300"><span class="text-2xl">🏆</span><span class="text-[9px] font-bold uppercase">Ligas</span></div>
    </nav>

    <script>
        // Função para abrir/fechar os resultados sem sair da página
        function openResults() { document.getElementById('resultsModal').classList.remove('hidden'); }
        function closeResults() { document.getElementById('resultsModal').classList.add('hidden'); }

        // Simulador de API de Palpites (Aqui ele puxa automático)
        const games = [
            { home: "Palmeiras", away: "Flamengo", league: "Brasileirão", tip: "Ambos Marcam", odd: "1.85", conf: "88%" },
            { home: "Arsenal", away: "Bayern", league: "Champions", tip: "Vitória Casa", odd: "1.65", conf: "92%" },
            { home: "Liverpool", away: "Real Madrid", league: "Champions", tip: "+2.5 Gols", odd: "1.70", conf: "94%" }
        ];

        const container = document.getElementById('ai-predictions');
        container.innerHTML = games.map(game => `
            <div class="bg-white rounded-[32px] p-6 shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${game.league}</span>
                    <span class="bg-green-100 text-green-600 text-[9px] px-2 py-1 rounded-full font-black">${game.conf} CONF.</span>
                </div>
                <h2 class="font-bold text-slate-800 text-center text-lg mb-4">${game.home} vs ${game.away}</h2>
                <div class="bg-slate-50 rounded-2xl p-4 flex justify-between items-center border border-slate-100">
                    <div>
                        <p class="text-[9px] text-slate-400 font-bold uppercase">Palpite</p>
                        <p class="font-bold text-pink-600">${game.tip}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">Odd</p>
                        <p class="font-black text-slate-900 text-xl">${game.odd}</p>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
