<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F8FAFC; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 15px 35px -5px rgba(0, 100, 255, 0.08); }
        .scanner-line { height: 3px; background: #0ea5e9; position: absolute; width: 100%; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #0ea5e9; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        .team-logo { width: 52px; height: 52px; object-contain: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-100 rounded-b-[40px] shadow-sm flex justify-between items-center">
        <div class="flex flex-col">
            <p class="text-[9px] font-black text-sky-500 uppercase tracking-widest leading-none mb-1">Tecnologia AI</p>
            <h1 class="text-2xl font-black italic text-slate-900 uppercase leading-none">Palpite<span class="text-sky-500">Bet</span></h1>
        </div>
        <a href="https://pay.kiwify.com.br/SEU_LINK_AQUI" class="bg-sky-500 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black shadow-lg shadow-sky-100 active:scale-95 transition-all">
            VIP R$ 9,99 (PIX)
        </a>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-7">

        <section class="bg-white rounded-[40px] p-7 border border-sky-50 card-shadow relative overflow-hidden">
            <div id="scanLine" class="hidden scanner-line"></div>
            <h3 class="text-xs font-black text-slate-800 uppercase mb-4 flex items-center gap-2">🔎 Scanner de Probabilidades</h3>
            <div class="space-y-3">
                <input id="ticketInput" type="text" placeholder="Cole o ID do seu bilhete..." class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-sky-100">
                <button onclick="startAnalysis()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all shadow-lg">Analisar Agora</button>
            </div>

            <div id="resAnalysis" class="hidden mt-6 p-5 bg-sky-50 rounded-3xl border border-sky-100">
                <div class="flex justify-between items-end mb-3">
                    <span id="score" class="text-4xl font-black text-slate-900 tracking-tighter">0%</span>
                    <span class="text-[9px] font-black text-green-600 uppercase italic">Green Provável</span>
                </div>
                <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-sky-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="msgFeedback" class="text-[10px] mt-3 font-bold text-slate-500 italic leading-relaxed"></p>
            </div>
        </section>

        <div class="flex justify-between items-center px-1">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[2px]">Próximos Jogos</h3>
            <span class="text-[10px] text-sky-500 font-black animate-pulse uppercase">Atualizado Agora</span>
        </div>
        
        <div id="games-container" class="space-y-6">
            </div>

        <section class="bg-white rounded-[40px] p-7 card-shadow border border-sky-50">
            <h3 class="text-xs font-black text-slate-800 uppercase mb-4 tracking-widest">🧮 Gestão de Banca</h3>
            <div class="space-y-3">
                <input id="banca" type="number" placeholder="Qual o valor da sua banca?" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-xl text-xs font-bold outline-none">
                <button onclick="calcGestao()" class="w-full bg-sky-500 text-white py-4 rounded-xl font-black text-[11px] uppercase tracking-widest shadow-lg shadow-sky-200">Calcular Entrada</button>
                <p id="resGestao" class="text-center text-[11px] font-bold text-sky-600 hidden italic"></p>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-sky-50 flex justify-around p-6 z-50 rounded-t-[40px] shadow-2xl">
        <div class="flex flex-col items-center gap-1 text-sky-600"><span class="text-2xl">⚡</span><p class="text-[8px] font-black uppercase tracking-tighter">Palpites</p></div>
        <a href="https://pay.kiwify.com.br/SEU_LINK_AQUI" class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">💰</span><p class="text-[8px] font-black uppercase tracking-tighter">VIP Pix</p></a>
        <div class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">📊</span><p class="text-[8px] font-black uppercase tracking-tighter">Banca</p></div>
    </nav>

    <script>
        function startAnalysis() {
            const input = document.getElementById('ticketInput').value;
            if(!input) return alert("Por favor, cole o bilhete!");
            const res = document.getElementById('resAnalysis');
            const line = document.getElementById('scanLine');
            res.classList.add('hidden');
            line.classList.remove('hidden');
            setTimeout(() => {
                line.classList.add('hidden');
                res.classList.remove('hidden');
                const score = Math.floor(Math.random() * (98 - 72 + 1)) + 72;
                document.getElementById('score').innerText = score + "%";
                document.getElementById('progressBar').style.width = score + "%";
                document.getElementById('msgFeedback').innerText = "O sistema analisou os dados de posse de bola e eficiência ofensiva. Recomendamos seguir com cautela e gestão.";
            }, 2000);
        }

        function calcGestao() {
            const v = document.getElementById('banca').value;
            const r = document.getElementById('resGestao');
            if(v) {
                const s = (v * 0.03).toFixed(2);
                r.innerHTML = `Sugerimos entrar com: R$ ${s} (3%)`;
                r.classList.remove('hidden');
            }
        }

        const matches = [
            { h: "Real Madrid", a: "Man. City", league: "CHAMPIONS LEAGUE", tip: "Vitória Casa", odd: "1.95", logoH: "86", logoA: "50" },
            { h: "Flamengo", a: "Palmeiras", league: "BRASILEIRÃO A", tip: "Ambos Marcam", odd: "1.82", logoH: "5981", logoA: "1053" },
            { h: "Barcelona", a: "Arsenal", league: "AMISTOSO", tip: "Vitória Mandante", odd: "2.10", logoH: "83", logoA: "42" }
        ];

        document.getElementById('games-container').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-8 border border-sky-50 card-shadow relative active:scale-95 transition-all">
                <p class="text-[9px] font-black text-slate-200 uppercase mb-6 tracking-[3px] text-center italic">${m.league}</p>
                <div class="flex items-center justify-between mb-8">
                    <div class="flex flex-col items-center gap-3 flex-1">
                        <img src="https://api.sofascore.app/api/v1/team/${m.logoH}/image" class="team-logo" onerror="this.src='https://wiki.sofascore.app/images/d/d4/Placeholder_Team.png'">
                        <p class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">${m.h}</p>
                    </div>
                    <div class="text-xs font-black text-slate-100 italic px-2">VS</div>
                    <div class="flex flex-col items-center gap-3 flex-1">
                        <img src="https://api.sofascore.app/api/v1/team/${m.logoA}/image" class="team-logo" onerror="this.src='https://wiki.sofascore.app/images/d/d4/Placeholder_Team.png'">
                        <p class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">${m.a}</p>
                    </div>
                </div>
                <div class="bg-sky-50 rounded-3xl p-5 flex justify-between items-center border border-sky-100">
                    <div>
                        <p class="text-[8px] text-sky-400 font-black uppercase tracking-widest mb-1">Palpite AI</p>
                        <p class="text-xs uppercase font-black ${m.tip.includes('Vitória') ? 'text-green-600' : 'text-slate-950'}">${m.tip}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] text-slate-400 font-black uppercase tracking-widest mb-1">Odd</p>
                        <span class="text-2xl font-black text-slate-900 leading-none tracking-tighter">@${m.odd}</span>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
