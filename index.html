<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-24 font-sans">

    <div class="bg-gradient-to-r from-pink-600 to-purple-600 text-white p-5 sticky top-0 z-50 shadow-lg">
        <h1 class="text-xl font-black italic">PALPITEBET</h1>
        <div class="flex gap-4 mt-3 text-[10px] font-bold overflow-x-auto whitespace-nowrap opacity-90">
            <span>DOM</span><span>SEG</span><span>TER</span><span class="border-b-2 border-white pb-1">HOJE</span><span>QUI</span><span>SEX</span>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-pink-100">
            <div class="flex justify-between mb-2 text-[9px] font-bold text-gray-400">
                <span>DICA IA</span><span class="text-green-500 font-black">94% CONF.</span>
            </div>
            <h2 class="font-bold text-center text-slate-800 mb-3">Real Madrid vs Man. City</h2>
            <div class="bg-pink-50 rounded-2xl p-4 flex justify-between items-center font-bold text-pink-700">
                <span class="text-sm">Mais de 2.5 Gols</span>
                <span class="text-xl text-slate-900">@1.72</span>
            </div>
        </div>

        <div class="space-y-2">
            <h3 class="text-[10px] font-bold text-gray-400 uppercase px-1">Jogos ao Vivo</h3>
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden" style="min-height: 800px;">
                <iframe src="https://www.livescore.bz/api.widget?type=live&theme=light" width="100%" height="800" frameborder="0"></iframe>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 z-50 shadow-2xl">
        <div class="text-pink-600 flex flex-col items-center"><span class="text-xl">🏠</span><span class="text-[9px] font-bold">Hoje</span></div>
        <div class="text-gray-400 flex flex-col items-center"><span class="text-xl">📡</span><span class="text-[9px] font-bold">Ao Vivo</span></div>
        <div class="text-gray-400 flex flex-col items-center"><span class="text-xl">🏆</span><span class="text-[9px] font-bold">Ligas</span></div>
    </nav>

</body>
</html>
