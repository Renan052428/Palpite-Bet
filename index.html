<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro - Lucro Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 15px 35px -5px rgba(0, 80, 200, 0.08); }
        .btn-money { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); transition: all 0.2s; }
        .btn-money:active { transform: scale(0.96); opacity: 0.9; }
        .team-circle { width: 48px; height: 48px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }
    </style>
</head>
<body class="bg-[#F8FAFC] pb-28">

    <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-50 rounded-b-[32px] shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-slate-900 uppercase">Palpite<span class="text-sky-500">Bet</span></h1>
            <a href="SEU_LINK_DO_TELEGRAM_AQUI" class="bg-sky-500 text-white px-4 py-2 rounded-2xl text-[10px] font-black animate-pulse">GRUPO VIP GRÁTIS</a>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-8">
        
        <section class="space-y-3">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[2px] ml-2">🔥 Bilhete do Dia (Combo)</h3>
            <div class="bg-slate-900 rounded-[35px] p-6 text-white card-shadow relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-green-500 text-white text-[9px] px-4 py-2 rounded-bl-2xl font-black">ODD 3.50+</div>
                
                <div class="space-y-4 mb-6 mt-2">
                    <div class="flex justify-between items-center border-b border-white/10 pb-3">
                        <span class="text-xs opacity-70">Real Madrid vs City</span>
                        <span class="text-xs font-bold text-green-400">Ambos Marcam</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs opacity-70">Arsenal vs Bayern</span>
                        <span class="text-xs font-bold text-green-400">Vitória Casa</span>
                    </div>
                </div>

                <a href="SEU_LINK_DE_AFILIADO_AQUI" class="btn-money w-full py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-green-500/20">
                    <span class="font-black uppercase text-xs tracking-widest">Apostar este Bilhete</span>
                    <span class="text-xl">💰</span>
                </a>
            </div>
        </section>

        <section class="space-y-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[2px] ml-2">Análises Individuais</h3>
            <div id="prediction-list" class="space-y-6"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-5 z-50 rounded-t-[35px] shadow-2xl">
        <div class="flex flex-col items-center gap-1 text-sky-500"><span class="text-2xl">🏠</span><p class="text-[8px] font-black uppercase">Tips</p></div>
        <div class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">📊</span><p class="text-[8px] font-black uppercase">Gestão</p></div>
        <a href="SEU_LINK_DE_AFILIADO_AQUI" class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-2xl">🏦</span><p class="text-[8px] font-black uppercase">Banca</p>
        </a>
    </nav>

    <script>
        function getTipStyle(tip) {
            const t = tip.toLowerCase();
            if (t.includes('vitória')) return 'text-green-600 font-black';
            if (t.includes('ambos marcam')) return 'text-slate-950 font-black';
            return 'text-sky-500';
        }

        const matches = [
            { h: "Barcelona", hColor: "#A50044", a: "Atlético", aColor: "#CB3524", league: "La Liga", tip: "Vitória Casa", odd: "1.95", conf: "92%" },
            { h: "Palmeiras", hColor: "#006437", a: "Flamengo", aColor: "#C8102E", league: "Brasileirão", tip: "Ambos Marcam", odd: "1.82", conf: "89%" }
        ];

        document.getElementById('prediction-list').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-8 border border-sky-50 card-shadow">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex flex-col items-center gap-2 flex-1">
                        <div class="team-circle" style="background-color: ${m.hColor}">${m.h[0]}</div>
                        <p class="text-[10px] font-bold text-slate-800">${m.h}</p>
                    </div>
                    <div class="text-[10px] font-black text-slate-200 italic">VS</div>
                    <div class="flex flex-col items-center gap-2 flex-1">
                        <div class="team-circle" style="background-color: ${m.aColor}">${m.a[0]}</div>
                        <p class="text-[10px] font-bold text-slate-800">${m.a}</p>
                    </div>
                </div>
                <div class="bg-slate-50 rounded-3xl p-5 flex justify-between items-center mb-5">
                    <div class="flex flex-col">
                        <p class="text-[8px] text-slate-400 font-black uppercase">Palpite</p>
                        <p class="text-xs uppercase ${getTipStyle(m.tip)}">${m.tip}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] text-slate-400 font-black uppercase">Odd</p>
                        <p class="text-xl font-black text-slate-900">@${m.odd}</p>
                    </div>
                </div>
                <a href="SEU_LINK_DE_AFILIADO_AQUI" class="block w-full py-3 bg-sky-50 text-sky-600 rounded-xl text-center text-[10px] font-black uppercase tracking-widest border border-sky-100 active:bg-sky-500 active:text-white transition-all">
                    Copiar palpite na Bet
                </a>
            </div>
        `).join('');
    </script>
</body>
</html>
