<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Elite - VIP Ativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F8FAFC; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 15px 35px -5px rgba(0, 100, 255, 0.08); }
        .pix-gradient { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); }
        .scanner-line { height: 3px; background: #0ea5e9; position: absolute; width: 100%; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #0ea5e9; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .team-box img { width: 56px; height: 56px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05)); }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-100 rounded-b-[40px] shadow-sm flex justify-between items-center">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black italic text-slate-900 uppercase leading-none">Palpite<span class="text-sky-500">Bet</span></h1>
            <p class="text-[9px] font-black text-sky-400 uppercase tracking-widest mt-1">Inteligência VIP 2.0</p>
        </div>
        <a href="https://pay.kiwify.com.br/mj9n838" class="pix-gradient text-white px-5 py-2.5 rounded-2xl text-[10px] font-black shadow-lg shadow-sky-200 active:scale-95 transition-all">
            VIP R$ 9,99
        </a>
    </header>

    <nav class="bg-white/90 backdrop-blur-md sticky top-[84px] z-40 overflow-x-auto no-scrollbar flex gap-4 px-6 py-4 border-b border-slate-50">
        <button class="bg-sky-500 text-white text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">⚽ Futebol</button>
        <button class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🏀 NBA</button>
        <button class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🥊 MMA</button>
        <button class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🎾 Tênis</button>
    </nav>

    <main class="max-w-md mx-auto p-5 space-y-8">

        <section class="bg-white rounded-[40px] p-7 border border-sky-50 card-shadow relative overflow-hidden">
            <div id="scanLine" class="hidden scanner-line"></div>
            <h3 class="text-xs font-black text-slate-800 uppercase mb-4 flex items-center gap-2">🔎 Scanner de Bilhetes</h3>
            <div class="space-y-3">
                <input id="ticketInput" type="text" placeholder="Cole o ID da aposta aqui..." class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-sky-100">
                <button onclick="startAnalysis()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all">Analisar Agora</button>
            </div>
        </section>

        <div id="games-container" class="space-y-6">
            </div>

        <div class="bg-slate-900 rounded-[40px] p-8 text-white card-shadow relative overflow-hidden text-center">
            <h4 class="text-xl font-black mb-1 uppercase italic">Pack de Sinais VIP</h4>
            <p class="text-[10px] opacity-60 font-bold mb-6 uppercase tracking-widest leading-relaxed">Receba os jogos com mais de 90% de assertividade direto no seu celular.</p>
            <a href="https://pay.kiwify.com.br/mj9n838" class="block w-full bg-sky-500 text-white py-4 rounded-2xl font-black uppercase text-[11px] shadow-lg">Quero Lucrar Agora</a>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-sky-50 flex justify-around p-6 z-50 rounded-t-[40px] shadow-2xl">
        <div class="flex flex-col items-center gap-1 text-sky-600"><span class="text-2xl">⚡</span><p class="text-[8px] font-black uppercase">Tips</p></div>
        <a href="https://pay.kiwify.com.br/mj9n838" class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-2xl">💰</span><p class="text-[8px] font-black uppercase">VIP Pix</p>
        </a>
        <div class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">👤</span><p class="text-[8px] font-black uppercase">Painel</p></div>
    </nav>

    <script>
        function startAnalysis() {
            const input = document.getElementById('ticketInput').value;
            if(!input) return alert("Por favor, cole um ID válido!");
            const line = document.getElementById('scanLine');
            line.classList.remove('hidden');
            setTimeout(() => {
                line.classList.add('hidden');
                alert("Análise concluída com sucesso! Para liberar o acesso aos dados completos do seu bilhete, adquira o Plano VIP.");
                window.location.href = "https://pay.kiwify.com.br/mj9n838";
            }, 2000);
        }

        // Dados dos Jogos com URLs de imagens mais estáveis (SofaScore CDN)
        const matches = [
            { h: "Real Madrid", a: "Man. City", l: "Champions League", t: "Vitória Casa", o: "1.95", idH: "86", idA: "50", sport: "⚽" },
            { h: "Lakers", a: "Warriors", l: "NBA", t: "Vitória: Lakers", o: "1.82", idH: "3427", idA: "3428", sport: "🏀" },
            { h: "Flamengo", a: "Palmeiras", l: "Brasileirão", t: "Ambos Marcam", o: "1.75", idH: "5981", idA: "1053", sport: "⚽" },
            { h: "Barcelona", a: "Arsenal", l: "Amistoso", t: "Vitória Casa", o: "2.10", idH: "83", idA: "42", sport: "⚽" }
        ];

        document.getElementById('games-container').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-8 border border-sky-50 card-shadow relative active:scale-[0.98] transition-all">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[9px] font-black text-slate-200 uppercase tracking-widest">${m.sport} ${m.l}</span>
                    <span class="text-[10px] bg-sky-50 text-sky-500 px-3 py-1 rounded-full font-black uppercase italic">Hoje</span>
                </div>
                
                <div class="flex items-center justify-between mb-8">
                    <div class="team-box flex flex-col items-center gap-3 flex-1">
                        <img src="https://api.sofascore.app/api/v1/team/${m.idH}/image" onerror="this.src='https://wiki.sofascore.app/images/d/d4/Placeholder_Team.png'">
                        <p class="text-[11px] font-black text-slate-800 uppercase text-center leading-tight">${m.h}</p>
                    </div>
                    <div class="px-4 text-[10px] font-black text-slate-100 italic">VS</div>
                    <div class="team-box flex flex-col items-center gap-3 flex-1">
                        <img src="https://api.sofascore.app/api/v1/team/${m.idA}/image" onerror="this.src='https://wiki.sofascore.app/images/d/d4/Placeholder_Team.png'">
                        <p class="text-[11px] font-black text-slate-800 uppercase text-center leading-tight">${m.a}</p>
                    </div>
                </div>

                <div class="bg-sky-50 rounded-3xl p-5 flex justify-between items-center border border-sky-100">
                    <div>
                        <p class="text-[8px] text-sky-400 font-black uppercase tracking-tighter mb-1">Palpite Recomendado</p>
                        <p class="text-xs uppercase font-black ${m.t.includes('Vitória') ? 'text-green-600' : 'text-slate-950'}">${m.t}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] text-slate-400 font-black uppercase mb-1">Cotação</p>
                        <span class="text-2xl font-black text-slate-900 tracking-tighter leading-none">@${m.o}</span>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
