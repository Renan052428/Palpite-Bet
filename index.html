<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet - Ao Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 text-slate-900 pb-20">

    <div class="bg-gradient-to-r from-pink-600 to-purple-600 text-white p-6 sticky top-0 z-50 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-black italic tracking-tighter">PALPITEBET</h1>
        <span class="text-xs bg-white text-pink-600 px-2 py-1 rounded-full font-bold">AO VIVO</span>
    </div>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="space-y-3">
            <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">Palpite do Dia (Análise IA)</h3>
            <div class="bg-white rounded-3xl p-5 border border-gray-100 shadow-sm">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold uppercase">Champions League</span>
                    <span class="text-green-500 font-bold text-[10px]">● 94% Match</span>
                </div>
                <h4 class="font-bold text-slate-900 text-base mb-4 text-center">Real Madrid vs Man. City</h4>
                <div class="bg-pink-50 p-4 rounded-2xl flex justify-between items-center">
                    <div>
                        <p class="text-[9px] text-pink-400 font-bold uppercase">Palpite</p>
                        <p class="font-bold text-pink-700">Mais de 2.5 Gols</p>
                    </div>
                    <p class="font-black text-slate-900 text-xl">1.72</p>
                </div>
            </div>
        </div>

        <div class="space-y-3">
            <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-1">Jogos de Hoje (Tempo Real)</h3>
            
            <div class="bg-white rounded-3xl p-2 shadow-sm border border-gray-100 overflow-hidden" style="height: 500px;">
                <iframe src="https://www.scoreaxis.com/widget/live-scores?autoHeight=1&amp;bodyBackground=%23ffffff&amp;textColor=%231e293b&amp;border=%23f1f5f9&amp;headerBackground=%23ffffff&amp;headerTextColor=%23pink-600&amp;inst=1" style="width: 100%; height: 100%; border: none;" transition:fade></iframe>
            </div>
            <p class="text-[9px] text-gray-400 text-center px-4">Placares fornecidos por ScoreAxis. Atualização automática.</p>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-3 z-50 shadow-2xl">
        <button class="flex flex-col items-center">
            <span class="text-xl">🏠</span>
            <span class="text-[9px] font-bold text-pink-600">Início</span>
        </button>
        <button class="flex flex-col items-center opacity-50">
            <span class="text-xl">⚽</span>
            <span class="text-[9px] font-bold text-slate-400">Jogos</span>
        </button>
        <button class="flex flex-col items-center opacity-50">
            <span class="text-xl">📈</span>
            <span class="text-[9px] font-bold text-slate-400">Odds</span>
        </button>
    </nav>

</body>
</html>
