<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PALPITE-BET | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* Restaurando o padrão exato aprovado */
        body { font-family: 'Inter', sans-serif; background: #F2F5F8; color: #334155; margin: 0; padding: 0; font-weight: 400; }
        
        .text-black-soft { color: #4b5563; } 
        .text-winner { color: #10b981; }    
        .text-game-time { color: #000000; } 

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; overflow-x: auto; display: flex; gap: 18px; padding: 12px 20px; }
        
        /* Escudos pequenos para não quebrar o alinhamento */
        .team-logo { width: 16px; height: 16px; object-fit: contain; flex-shrink: 0; }

        .league-header { background: #E5E9F0; padding: 8px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d1d5db; }
        .league-title { display: flex; align-items: center; gap: 8px; font-size: 10px; text-transform: uppercase; color: #475569; }
        .badge-count { background: #ef4444; color: white; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }

        /* Card de jogo fixo */
        .game-card { background: white; padding: 12px 18px; display: flex; align-items: center; border-bottom: 1px solid #f1f5f9; min-height: 70px; }
        .time-col { width: 45px; font-size: 11px; text-align: left; flex-shrink: 0; }
        .teams-col { flex: 1; padding: 0 10px; display: flex; flex-direction: column; justify-content: center; }
        
        .team-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; height: 22px; }
        .team-info { display: flex; align-items: center; gap: 8px; cursor: pointer; } /* Clique aqui para futura análise */
        
        .btn-analisar { background: #f8fafc; border: 1px solid #e2e8f0; color: #3b82f6; font-size: 10px; padding: 8px 12px; border-radius: 6px; min-width: 105px; text-align: center; font-weight: 500; text-decoration: none; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px; border-top: 1px solid #e2e8f0; z-index: 1000; }
        .nav-link { text-align: center; font-size: 9px; color: #94a3b8; text-transform: uppercase; text-decoration: none; }
        .nav-link.active { color: #ef4444; }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 bg-white flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-bold italic uppercase tracking-tighter" style="letter-spacing: -1px;">PALPITE<span class="text-blue-600">BET</span></h1>
            <p class="text-[8px] font-medium text-slate-400 uppercase tracking-widest">Global Intelligence</p>
        </div>
        <a href="https://mpago.la/16fRczK" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] uppercase font-bold">Ativar VIP</a>
    </header>

    <div class="bg-white px-4 pt-4 pb-2">
        <div class="bg-slate-50 rounded-2xl p-4 border border-slate-100 flex gap-2">
            <input type="text" placeholder="Código do bilhete..." class="flex-1 bg-white p-3 rounded-xl text-xs outline-none border border-slate-200">
            <button class="bg-slate-900 text-white px-4 rounded-xl text-[10px] uppercase font-bold">Analisar</button>
        </div>
    </div>

    <div class="bg-white no-scrollbar border-b border-slate-100">
        <div class="text-center min-w-[55px]"> <div class="text-[9px] text-slate-400 uppercase">Sex</div> <div class="text-[13px] text-slate-700">10.04</div> </div>
        <div class="text-center min-w-[55px]"> <div class="text-[9px] text-slate-400 uppercase">Sáb</div> <div class="text-[13px] text-slate-700">11.04</div> </div>
        <div class="text-center min-w-[55px] border-b-2 border-red-500"> <div class="text-[9px] text-red-500 font-bold uppercase">Hoje</div> <div class="text-[13px] text-red-500 font-bold">12.04</div> </div>
        <div class="text-center min-w-[55px]"> <div class="text-[9px] text-slate-400 uppercase">Seg</div> <div class="text-[13px] text-slate-700">13.04</div> </div>
        <div class="text-center min-w-[55px]"> <div class="text-[9px] text-slate-400 uppercase">Ter</div> <div class="text-[13px] text-slate-700">14.04</div> </div>
    </div>

    <main class="mt-2">
        <div class="league-header">
            <div class="league-title">
                <img src="https://flagcdn.com/w20/br.png" class="w-4">
                <span>Brasil: Brasileirão Betano</span>
            </div>
            <span class="badge-count">5</span>
        </div>

        <div class="game-card">
            <div class="time-col text-game-time">54' <br> <span class="text-[9px] text-slate-300">🎧</span></div>
            <div class="teams-col">
                <div class="team-row text-winner">
                    <div class="team-info" onclick="alert('Abrindo análise do Athletico...')">
                        <img src="https://ssl.gstatic.com/onebox/media/sports/logos/79p968T9X4K_XreG949m8A_48x48.png" class="team-logo">
                        <span>Athletico-PR</span>
                    </div>
                    <span>2</span>
                </div>
                <div class="team-row text-black-soft">
                    <div class="team-info" onclick="alert('Abrindo análise da Chapecoense...')">
                        <img src="https://ssl.gstatic.com/onebox/media/sports/logos/969v67STYp0-Z_UaY9m8A_48x48.png" class="team-logo">
                        <span>Chapecoense</span>
                    </div>
                    <span>0</span>
                </div>
            </div>
            <a href="https://mpago.la/16fRczK" class="btn-analisar">ANALISAR @1.39</a>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-link active">🏠<br>Hoje</a>
        <a href="#" class="nav-link">📡<br>Ao Vivo</a>
        <a href="#" class="nav-link">⭐<br>Favoritos</a>
        <a href="#" class="nav-link">🏆<br>Ligas</a>
    </nav>

</body>
</html>
