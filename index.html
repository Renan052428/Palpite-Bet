<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet AI - Inteligência de Banca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F4F7FA; color: #1e293b; }
        .card-premium { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .vip-blur { filter: blur(5px); opacity: 0.3; }
        .scanner-line { height: 2px; background: #0ea5e9; position: absolute; width: 100%; top: 0; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white p-6 sticky top-0 z-50 border-b border-slate-100 flex justify-between items-center shadow-sm">
        <h1 class="text-2xl font-black italic uppercase text-slate-900">Palpite<span class="text-sky-500">Bet</span></h1>
        <button onclick="window.location.href='https://linkdepagamento.com.br'" class="bg-amber-400 text-amber-900 px-4 py-2 rounded-2xl text-[10px] font-black shadow-lg shadow-amber-200">ASSINAR VIP</button>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-6">

        <section class="bg-white rounded-[35px] p-6 border border-sky-100 shadow-xl overflow-hidden relative">
            <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-400 mb-4 italic">🔎 Analisador Pro</h3>
            <p class="text-[10px] text-slate-500 mb-4 font-bold uppercase">Cole o link/ID da sua aposta para analisar a probabilidade:</p>
            
            <div class="relative mb-3">
                <input id="ticketId" type="text" placeholder="Ex: bet365-123x78..." class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs outline-none focus:border-sky-500">
                <div id="scanLine" class="hidden scanner-line"></div>
            </div>

            <button onclick="analisarBilhete()" class="w-full bg-sky-500 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Analisar Probabilidades</button>
            
            <div id="resultBox" class="hidden mt-5 p-4 bg-slate-900 rounded-2xl text-white">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[9px] font-black uppercase opacity-60">Probabilidade de Green:</span>
                    <span id="probScore" class="text-lg font-black text-green-400">0%</span>
                </div>
                <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden">
                    <div id="probBar" class="bg-green-400 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="feedbackText" class="text-[10px] mt-3 font-bold italic leading-relaxed text-slate-300"></p>
            </div>
        </section>

        <div class="flex gap-4 overflow-x-auto no-scrollbar py-2 text-[10px] font-black uppercase tracking-widest text-slate-400">
            <span class="text-sky-500 border-b-2 border-sky-500 pb-1">Futebol</span>
            <span>Basquete (NBA)</span>
            <span>Tênis</span>
            <span>UFC</span>
        </div>

        <div id="games-list" class="space-y-4">
            </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-around p-6 z-50 rounded-t-[40px]">
        <div class="flex flex-col items-center text-sky-500"><span class="text-2xl">⚡</span><p class="text-[8px] font-black uppercase">Tips</p></div>
        <div class="flex flex-col items-center text-slate-300"><span class="text-2xl">🤖</span><p class="text-[8px] font-black uppercase">Análise</p></div>
        <div onclick="window.location.href='https://linkdepagamento.com.br'" class="flex flex-col items-center text-slate-300"><span class="text-2xl">💎</span><p class="text-[8px] font-black uppercase">VIP</p></div>
    </nav>

    <script>
        // Função de Análise Automática
        function analisarBilhete() {
            const input = document.getElementById('ticketId').value;
            const res = document.getElementById('resultBox');
            const scan = document.getElementById('scanLine');
            
            if(!input) return alert("Insira o ID do bilhete!");

            scan.classList.remove('hidden');
            
            setTimeout(() => {
                scan.classList.add('hidden');
                res.classList.remove('hidden');
                
                // Simulação de lógica de IA: gera uma nota entre 65 e 94
                const score = Math.floor(Math.random() * (94 - 65 + 1)) + 65;
                document.getElementById('probScore').innerText = score + "%";
                document.getElementById('probBar').style.width = score + "%";
                
                const feedbacks = [
                    "Esta é uma entrada de alto valor! A tendência estatística favorece o mercado escolhido.",
                    "Análise concluída: Baixa exposição ao risco identificada nas últimas 5 rodadas destes times.",
                    "Atenção: A probabilidade é boa, mas o histórico recente indica risco de zebra no segundo tempo."
                ];
                document.getElementById('feedbackText').innerText = feedbacks[Math.floor(Math.random() * feedbacks.length)];
            }, 2000);
        }

        // Dados dos Jogos com Datas
        const games = [
            { h: "Real Madrid", a: "Man City", date: "Hoje, 16:00", league: "Champions League", tip: "Ambos Marcam", odd: "1.65" },
            { h: "Flamengo", a: "Palmeiras", date: "Amanhã, 21:30", league: "Brasileirão", tip: "Vitória Casa", odd: "2.10" },
            { h: "Lakers", a: "Warriors", date: "Hoje, 23:00", league: "NBA", tip: "Over 220.5 pts", odd: "1.90" }
        ];

        document.getElementById('games-list').innerHTML = games.map(g => `
            <div class="bg-white rounded-[30px] p-6 border border-slate-100 shadow-sm relative overflow-hidden">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[9px] font-black text-slate-300 uppercase italic">${g.league}</span>
                    <span class="text-[9px] font-black text-sky-500 uppercase tracking-widest">${g.date}</span>
                </div>
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-black text-slate-800 uppercase">${g.h}</span>
                    <span class="text-[10px] font-bold text-slate-200">VS</span>
                    <span class="text-xs font-black text-slate-800 uppercase">${g.a}</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center border border-slate-100">
                    <div class="flex flex-col">
                        <span class="text-[8px] font-black text-slate-400 uppercase">Sugestão</span>
                        <span class="text-[10px] font-black text-slate-900 uppercase">${g.tip}</span>
                    </div>
                    <span class="text-xl font-black text-slate-900 tracking-tighter">@${g.odd}</span>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
