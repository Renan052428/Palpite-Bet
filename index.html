<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F4F7F9; color: #1A1C1E; overflow-y: auto !important; height: auto !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Estilo Calendário */
        .date-btn { color: #8E9194; font-weight: 800; text-align: center; min-width: 60px; cursor: pointer; }
        .date-btn.active { color: #000; position: relative; }
        .date-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 25%; width: 50%; height: 3px; background: #EF4444; border-radius: 2px; }

        /* Estilo Liga */
        .league-row { background: #FFF; border-radius: 12px; border-left: 4px solid #0EA5E9; padding: 12px 15px; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }

        /* Card de Jogo */
        .match-card { background: #FFF; border-radius: 20px; padding: 18px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .team-logo { width: 22px; height: 22px; object-fit: contain; }
        
        /* Modal de Carregamento Pix */
        #loader { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #0ea5e9; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-widest text-slate-500">Processando com a Casa de Apostas...</p>
    </div>

    <header class="bg-white px-5 py-5 sticky top-0 z-50 border-b border-slate-100 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">Palpite<span class="text-sky-500">Bet</span></h1>
            <p class="text-[8px] font-black text-sky-400 uppercase tracking-widest">Global Intelligence</p>
        </div>
        <button onclick="goToPix()" class="bg-sky-500 text-white px-4 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-sky-100">Acesso VIP</button>
    </header>

    <div class="p-4 bg-white border-b border-slate-50">
        <div class="bg-slate-50 rounded-[25px] p-5 border border-slate-100">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs">🔎</span>
                <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Scanner de Bilhetes (Todos os Esportes)</span>
            </div>
            <div class="flex gap-2">
                <input id="ticketInput" type="text" placeholder="Cole o código do bilhete aqui..." class="flex-1 bg-white border border-slate-200 p-3 rounded-xl text-xs font-bold outline-none">
                <button onclick="goToPix()" class="bg-slate-900 text-white px-5 rounded-xl font-black text-[9px] uppercase italic">Analisar</button>
            </div>
        </div>
    </div>

    <nav class="bg-white border-b border-slate-100 overflow-x-auto no-scrollbar flex py-3 px-4 gap-4">
        <div class="date-btn">
            <div class="text-[7px] uppercase">Ter</div>
            <div class="text-[11px]">07.04</div>
        </div>
        <div class="date-btn">
            <div class="text-[7px] uppercase">Qua</div>
            <div class="text-[11px]">08.04</div>
        </div>
        <div class="date-btn active">
            <div class="text-[7px] uppercase text-red-500 font-black italic">Hoje</div>
            <div class="text-[11px]">09.04</div>
        </div>
        <div class="date-btn">
            <div class="text-[7px] uppercase">Sex</div>
            <div class="text-[11px]">10.04</div>
        </div>
        <div class="date-btn">
            <div class="text-[7px] uppercase">Sáb</div>
            <div class="text-[11px]">11.04</div>
        </div>
        <div class="date-btn">
            <div class="text-[7px] uppercase">Dom</div>
            <div class="text-[11px]">12.04</div>
        </div>
    </nav>

    <div class="flex gap-3 p-4 overflow-x-auto no-scrollbar bg-slate-50/50">
        <button onclick="renderAll('Futebol')" class="bg-sky-500 text-white text-[9px] font-black uppercase px-6 py-2.5 rounded-full shadow-md">⚽ Futebol</button>
        <button onclick="renderAll('NBA')" class="bg-white text-slate-400 border border-slate-200 text-[9px] font-black uppercase px-6 py-2.5 rounded-full">🏀 Basquete</button>
        <button onclick="renderAll('Tênis')" class="bg-white text-slate-400 border border-slate-200 text-[9px] font-black uppercase px-6 py-2.5 rounded-full">🎾 Tênis</button>
        <button onclick="renderAll('Vôlei')" class="bg-white text-slate-400 border border-slate-200 text-[9px] font-black uppercase px-6 py-2.5 rounded-full">🏐 Vôlei</button>
        <button onclick="renderAll('MMA')" class="bg-white text-slate-400 border border-slate-200 text-[9px] font-black uppercase px-6 py-2.5 rounded-full">🥊 MMA</button>
        <button onclick="renderAll('Futsal')" class="bg-white text-slate-400 border border-slate-200 text-[9px] font-black uppercase px-6 py-2.5 rounded-full">👟 Futsal</button>
        <button onclick="renderAll('E-Sports')" class="bg-white text-slate-400 border border-slate-200 text-[9px] font-black uppercase px-6 py-2.5 rounded-full">🎮 E-Sports</button>
    </div>

    <main class="px-4 py-2 space-y-6" id="games-feed">
        </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-5 z-50 rounded-t-[35px] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <div class="flex flex-col items-center gap-1 text-red-500 font-black text-[9px] uppercase">
            <span class="text-xl">🏠</span>Hoje
        </div>
        <div onclick="goToPix()" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase cursor-pointer">
            <span class="text-xl opacity-30">📡</span>Ao Vivo
        </div>
        <div onclick="goToPix()" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase cursor-pointer">
            <span class="text-xl opacity-30">⭐</span>Favoritos
        </div>
        <div onclick="goToPix()" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase cursor-pointer">
            <span class="text-xl opacity-30">👤</span>Perfil
        </div>
    </nav>

    <script>
        // REDIRECIONAMENTO PIX
        function goToPix() {
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                window.location.href = "https://pay.kiwify.com.br/mj9n838";
            }, 1200);
        }

        const getLogo = (name) => `https://www.google.com/s2/favicons?domain=${name.toLowerCase().replace(/ /g, '')}.com&sz=128`;
        const getLogoFallback = (name) => `https://ui-avatars.com/api/?name=${name}&background=f1f5f9&color=0ea5e9&bold=true`;

        // BANCO DE DADOS EXPANDIDO (SIMULANDO TODOS OS ESPORTES)
        const database = [
            {
                category: "Futebol",
                leagues: [
                    { name: "CONMEBOL LIBERTADORES", icon: "🌎", matches: [
                        { h: "Flamengo", a: "Palestino", o: "1.25" },
                        { h: "Atlético-MG", a: "Rosario", o: "1.60" },
                        { h: "São Paulo", a: "Cobresal", o: "1.35" }
                    ]},
                    { name: "UEFA CHAMPIONS LEAGUE", icon: "🇪🇺", matches: [
                        { h: "Real Madrid", a: "Man City", o: "2.10" },
                        { h: "Arsenal", a: "Bayern", o: "1.75" }
                    ]},
                    { name: "PREMIER LEAGUE", icon: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", matches: [
                        { h: "Liverpool", a: "Crystal Palace", o: "1.20" },
                        { h: "Arsenal", a: "Aston Villa", o: "1.30" }
                    ]}
                ]
            },
            {
                category: "NBA",
                leagues: [
                    { name: "NBA - USA", icon: "🏀", matches: [
                        { h: "Lakers", a: "Warriors", o: "1.85" },
                        { h: "Celtics", a: "Bucks", o: "1.55" },
                        { h: "Nuggets", a: "Suns", o: "1.65" }
                    ]}
                ]
            },
            {
                category: "MMA",
                leagues: [
                    { name: "UFC 300", icon: "🥊", matches: [
                        { h: "Alex Poatan", a: "Jamahal Hill", o: "1.70" },
                        { h: "Charles Do Bronx", a: "Arman Tsarukyan", o: "2.50" }
                    ]}
                ]
            }
        ];

        function renderAll(filter = 'Futebol') {
            const feed = document.getElementById('games-feed');
            let html = '';
            
            const selected = database.filter(d => filter === 'Todas' || d.category.includes(filter) || filter === 'Futebol');

            selected.forEach(cat => {
                cat.leagues.forEach(lg => {
                    html += `
                        <div class="space-y-2">
                            <div class="league-row">
                                <span class="text-xs">${lg.icon}</span>
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">${lg.name}</span>
                            </div>
                            ${lg.matches.map(m => `
                                <div class="match-card" onclick="goToPix()">
                                    <div class="space-y-3 flex-1">
                                        <div class="flex items-center gap-3">
                                            <img src="${getLogo(m.h)}" onerror="this.src='${getLogoFallback(m.h)}'" class="team-logo">
                                            <span class="text-[11px] font-black uppercase text-slate-700 tracking-tighter">${m.h}</span>
                                        </div>
                                        <div class="flex items-center gap-3">
                                            <img src="${getLogo(m.a)}" onerror="this.src='${getLogoFallback(m.a)}'" class="team-logo">
                                            <span class="text-[11px] font-black uppercase text-slate-700 tracking-tighter">${m.a}</span>
                                        </div>
                                    </div>
                                    <div class="bg-sky-50 px-5 py-3 rounded-2xl text-right border border-sky-100">
                                        <p class="text-[7px] text-sky-400 font-black uppercase mb-1">Entrada</p>
                                        <p class="text-[12px] font-black text-sky-600">@${m.o}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                });
            });
            feed.innerHTML = html;
        }

        renderAll();
    </script>
</body>
</html>
