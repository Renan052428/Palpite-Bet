<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 15px 35px -5px rgba(0, 80, 200, 0.08); }
        .team-circle { width: 48px; height: 48px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-[#F8FAFC] pb-28">

    <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-50 rounded-b-[32px] shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-slate-900 uppercase">Palpite<span class="text-sky-500">Bet</span></h1>
            <div class="bg-green-50 text-green-600 px-3 py-1.5 rounded-xl text-[9px] font-black border border-green-100">VERSÃO PRO 2.0</div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-8">
        
        <section class="space-y-3">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[2px] ml-2">🔥 Sugestão de Bilhete Pronto</h3>
            <div class="bg-slate-900 rounded-[35px] p-6 text-white card-shadow relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-sky-500 text-white text-[9px] px-4 py-2 rounded-bl-2xl font-black uppercase">Múltipla</div>
                
                <div class="space-y-4 mb-6 mt-2">
                    <div class="flex justify-between items-center border-b border-white/10 pb-3">
                        <span class="text-xs opacity-70 italic font-bold">Real Madrid vs City</span>
                        <span class="text-xs font-black text-green-400">AMBOS MARCAM</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs opacity-70 italic font-bold">Arsenal vs Bayern</span>
                        <span class="text-xs font-black text-green-400">VITÓRIA CASA</span>
                    </div>
                </div>

                <button onclick="openModal('Este bilhete foi analisado com base em dados estatísticos. Procure por estas seleções na sua casa de preferência.')" class="w-full py-4 bg-green-500 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-green-500/20 active:scale-95 transition-all">
                    <span class="font-black uppercase text-xs tracking-widest text-white">Ver Análise Completa</span>
                </button>
            </div>
        </section>

        <section class="space-y-4">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[2px] ml-2">Tips Individuais</h3>
            <div id="prediction-list" class="space-y-6"></div>
        </section>

        <footer class="text-center px-4 opacity-30 text-[9px] font-bold uppercase tracking-widest pb-10">
            O PalpiteBet não é uma casa de apostas.<br>Fornecemos apenas estatísticas e análises esportivas.
        </footer>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-5 z-50 rounded-t-[35px] shadow-2xl">
        <div class="flex flex-col items-center gap-1 text-sky-500"><span class="text-2xl">🏠</span><p class="text-[8px] font-black uppercase">Tips</p></div>
        <div onclick="openModal('Em breve: Gestor de Banca Automático para controlar seus lucros.')" class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">📊</span><p class="text-[8px] font-black uppercase">Gestão</p></div>
        <div onclick="openModal('Dica: Use sempre apenas 3% da sua banca por palpite para manter a segurança.')" class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-2xl">🏦</span><p class="text-[8px] font-black uppercase">Banca</p>
        </div>
    </nav>

    <div id="infoModal" class="modal" onclick="closeModal()">
        <div class="bg-white p-8 rounded-[40px] max-w-xs w-full shadow-2xl" onclick="event.stopPropagation()">
            <div class="text-3xl mb-4">💡</div>
            <p id="modalText" class="text-sm font-bold text-slate-700 leading-relaxed mb-6"></p>
            <button onclick="closeModal()" class="w-full py-3 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px]">Entendido</button>
        </div>
    </div>

    <script>
        function openModal(text) {
            document.getElementById('modalText').innerText = text;
            document.getElementById('infoModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('infoModal').classList.remove('active');
        }

        function getTipStyle(tip) {
            const t = tip.toLowerCase();
            if (t.includes('vitória')) return 'text-green-600 font-black';
            if (t.includes('ambos marcam')) return 'text-slate-950 font-black';
            return 'text-sky-500 font-bold';
        }

        const matches = [
            { h: "Barcelona", hColor: "#A50044", a: "Atlético", aColor: "#CB3524", league: "La Liga", tip: "Vitória Casa", odd: "1.95", conf: "92%" },
            { h: "Palmeiras", hColor: "#006437", a: "Flamengo", aColor: "#C8102E", league: "Brasileirão", tip: "Ambos Marcam", odd: "1.82", conf: "89%" }
        ];

        document.getElementById('prediction-list').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-8 border border-sky-50 card-shadow">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex flex-col items-center gap-3 flex-1">
                        <div class="team-circle shadow-lg shadow-sky-50" style="background-color: ${m.hColor}">${m.h[0]}</div>
                        <p class="text-[10px] font-black text-slate-800 uppercase tracking-tighter">${m.h}</p>
                    </div>
                    <div class="font-black text-slate-100 italic text-xs px-2">VS</div>
                    <div class="flex flex-col items-center gap-3 flex-1">
                        <div class="team-circle shadow-lg shadow-sky-50" style="background-color: ${m.aColor}">${m.a[0]}</div>
                        <p class="text-[10px] font-black text-slate-800 uppercase tracking-tighter">${m.a}</p>
                    </div>
                </div>
                <div class="bg-slate-50 rounded-3xl p-5 flex justify-between items-center border border-slate-100/50 mb-2">
                    <div class="flex flex-col">
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Palpite</p>
                        <p class="text-xs uppercase ${getTipStyle(m.tip)}">${m.tip}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Odd</p>
                        <p class="text-xl font-black text-slate-900 tracking-tighter">@${m.odd}</p>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
