<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Garante que o widget se adapte ao seu design */
        #fs-official-widget { border-radius: 24px; overflow: hidden; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 pb-20">

    <header class="bg-gradient-to-r from-pink-600 to-purple-700 text-white p-5 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">PalpiteBet</h1>
            <div class="flex gap-4"><span class="text-lg">🔍</span><span class="text-lg">👤</span></div>
        </div>
        <div class="max-w-md mx-auto mt-4 flex gap-5 overflow-x-auto no-scrollbar text-[10px] font-bold uppercase whitespace-nowrap">
            <div class="flex flex-col items-center border-b-2 border-white pb-1"><span>HOJE</span><span>08.04</span></div>
            <div class="flex flex-col items-center opacity-40"><span>QUI</span><span>09.04</span></div>
            <div class="flex flex-col items-center opacity-40"><span>SEX</span><span>10.04</span></div>
            <div class="flex flex-col items-center opacity-40"><span>SÁB</span><span>11.04</span></div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-5">
        
        <section class="bg-white rounded-[32px] p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Dica do Dia</span>
                <span class="bg-green-100 text-green-600 text-[10px] px-2 py-1 rounded-full font-bold">94% Match</span>
            </div>
            <h2 class="font-bold text-slate-800 text-center text-lg mb-4">Real Madrid vs Man. City</h2>
            <div class="bg-pink-50 rounded-2xl p-4 flex justify-between items-center">
                <p class="font-bold text-pink-600">Mais de 2.5 Gols</p>
                <p class="font-black text-slate-900 text-xl">@1.72</p>
            </div>
        </section>

        <section class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Resultados em Tempo Real</h3>
                <span class="bg-red-500 text-white text-[9px] px-2 py-0.5 rounded-full animate-pulse">LIVE</span>
            </div>

            <div id="fs-official-widget">
                <iframe src="https://prod-widgets.livescore.com/widgets/v1/stage/soccer/today/1.00?culture=pt-br&timezone=3" width="100%" height="600" frameborder="0" scrolling="auto"></iframe>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-4 z-50 shadow-lg">
        <div class="flex flex-col items-center text-pink-600"><span class="text-xl">🏠</span><span class="text-[9px] font-bold uppercase">Hoje</span></div>
        <div class="flex flex-col items-center text-slate-400 opacity-40"><span class="text-xl">📡</span><span class="text-[9px] font-bold uppercase">Ao Vivo</span></div>
        <div class="flex flex-col items-center text-slate-400 opacity-40"><span class="text-xl">🏆</span><span class="text-[9px] font-bold uppercase">Ligas</span></div>
    </nav>

</body>
</html>
