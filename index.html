<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PALPITE-BET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F8FAFC; color: #334155; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; overflow-x: auto; display: flex; gap: 20px; padding: 10px 20px; }
        
        /* Travando o layout dos times */
        .team-logo { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
        .game-card { background: white; padding: 12px 16px; display: flex; align-items: center; border-bottom: 1px solid #F1F5F9; }
        .teams-col { flex: 1; padding: 0 12px; }
        .team-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; height: 24px; }
        .team-info { display: flex; align-items: center; gap: 8px; }
        
        /* Botão Analisar */
        .btn-analisar { background: #F1F5F9; color: #3B82F6; font-size: 10px; font-weight: 600; padding: 8px 12px; border-radius: 6px; text-decoration: none; min-width: 105px; text-align: center; }
    </style>
</head>
<body class="pb-20">

    <header class="p-4 bg-white flex justify-between items-center border-b border-slate-100">
        <div>
            <h1 class="text-xl font-bold italic tracking-tighter">PALPITE<span class="text-blue-600">BET</span></h1>
            <p class="text-[8px] text-slate-400 uppercase tracking-widest">Global Intelligence</p>
        </div>
        <a href="https://mpago.la/16fRczK" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Ativar VIP</a>
    </header>

    <div class="p-4 bg-white">
        <div class="bg-slate-50 rounded-2xl p-4 flex gap-2 border border-slate-100">
            <input type="text" placeholder="Cole o código aqui..." class="flex-1 bg-white p-3 rounded-xl text-xs outline-none border border-slate-200">
            <button class="bg-slate-900 text-white px-5 rounded-xl text-[10px] font-bold uppercase">Analisar</button>
        </div>
    </div>

    <div class="bg-white no-scrollbar border-b border-slate-100">
        <div class="text-center min-w-[50px]"> <div class="text-[10px] text-slate-400">SEX</div> <div class="text-[13px]">10.04</div> </div>
        <div class="text-center min-w-[50px]"> <div class="text-[10px] text-slate-400">SÁB</div> <div class="text-[13px]">11.04</div> </div>
        <div class="text-center min-w-[50px] border-b-2 border-red-500"> <div class="text-[10px] text-red-500 font-bold">HOJE</div> <div class="text-[13px] text-red-500 font-bold">12.04</div> </div>
        <div class="text-center min-w-[50px]"> <div class="text-[10px] text-slate-400">SEG</div> <div class="text-[13px]">13.04</div> </div>
    </div>

    <main class="mt-2">
        <div class="bg-slate-200/50 px-4 py-2 flex justify-between items-center text-[10px] font-bold text-slate-500 uppercase">
            <div class="flex items-center gap-2">
                <img src="https://flagcdn.com/w20/br.png" class="w-4">
                <span>Brasil: Brasileirão Betano</span>
            </div>
            <span class="bg-red-500 text-white px-1.5 rounded">5</span>
        </div>

        <div class="game-card">
            <div class="text-[11px] font-bold w-8">54' <br> <span class="text-slate-300 font-normal">🎧</span></div>
            <div class="teams-col">
                <div class="team-row text-emerald-500">
                    <div class="team-info">
                        <img src="https://ssl.gstatic.com/onebox/media/sports/logos/79p968T9X4K_XreG949m8A_48x48.png" class="team-logo">
                        <span>Athletico-PR</span>
                    </div>
                    <span class="font-bold">2</span>
                </div>
                <div class="team-row text-slate-600">
                    <div class="team-info">
                        <img src="https://ssl.gstatic.com/onebox/media/sports/logos/969v67STYp0-Z_UaY9m8A_48x48.png" class="team-logo">
                        <span>Chapecoense</span>
                    </div>
                    <span class="font-bold">0</span>
                </div>
            </div>
            <a href="https://mpago.la/16fRczK" class="btn-analisar">ANALISAR @1.39</a>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white flex justify-around p-3 border-t border-slate-100 shadow-lg">
        <a href="#" class="text-[10px] text-red-500 font-bold text-center">🏠<br>HOJE</a>
        <a href="#" class="text-[10px] text-slate-400 text-center">📡<br>AO VIVO</a>
        <a href="#" class="text-[10px] text-slate-400 text-center">⭐<br>FAVORITOS</a>
        <a href="#" class="text-[10px] text-slate-400 text-center">🏆<br>LIGAS</a>
    </nav>

</body>
</html>
