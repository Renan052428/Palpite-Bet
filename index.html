<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F8FAFC; color: #1e293b; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 100, 255, 0.06); }
        .pix-btn { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Círculo reserva caso a imagem falhe */
        .team-logo { width: 48px; height: 48px; object-fit: contain; border-radius: 50%; background: #fff; padding: 5px; border: 1px solid #f1f5f9; }
        #game-details { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #F8FAFC; z-index: 100; overflow-y: auto; }
        .tab-active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; }
    </style>
</head>
<body class="pb-24">

    <div id="main-content">
        <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-100 flex justify-between items-center rounded-b-[30px]">
            <div class="flex flex-col">
                <h1 class="text-2xl font-black italic text-slate-900 uppercase leading-none">Palpite<span class="text-sky-500">Bet</span></h1>
                <p class="text-[9px] font-black text-sky-400 uppercase tracking-widest mt-1">Estatísticas & VIP</p>
            </div>
            <a href="https://pay.kiwify.com.br/mj9n838" class="pix-btn text-white px-5 py-2.5 rounded-2xl text-[10px] font-black shadow-lg">VIP R$ 9,99</a>
        </header>

        <nav class="bg-white/90 backdrop-blur-md sticky top-[80px] z-40 overflow-x-auto no-scrollbar flex gap-4 px-6 py-4 border-b border-slate-50">
            <button class="bg-sky-500 text-white text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">⚽ Futebol</button>
            <button class="bg-slate-100 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🏀 NBA</button>
            <button class="bg-slate-100 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🥊 MMA</button>
        </nav>

        <main class="max-w-md mx-auto p-5 space-y-4" id="games-feed">
            </main>
    </div>

    <div id="game-details">
        <div class="bg-slate-900 text-white p-5 flex items-center gap-4">
            <button onclick="closeDetails()" class="text-2xl font-bold">←</button>
            <span id="det-league" class="text-[10px] font-black uppercase tracking-[2px]"></span>
        </div>

        <div class="bg-white p-8 flex justify-between items-center border-b border-slate-100 shadow-sm">
            <div class="flex flex-col items-center gap-3 flex-1 text-center">
                <img id="det-logo-h" src="" class="team-logo shadow-md">
                <span id="det-name-h" class="text-[11px] font-black uppercase text-slate-800"></span>
            </div>
            <div class="flex flex-col items-center flex-1">
                <span class="text-[9px] text-slate-300 font-bold mb-1">HOJE 16:00</span>
                <span class="text-3xl font-black text-slate-900">VS</span>
                <span class="text-[9px] text-sky-500 font-black mt-1">PROBABILIDADE GREEN</span>
            </div>
            <div class="flex flex-col items-center gap-3 flex-1 text-center">
                <img id="det-logo-a" src="" class="team-logo shadow-md">
                <span id="det-name-a" class="text-[11px] font-black uppercase text-slate-800"></span>
            </div>
        </div>

        <div class="bg-white flex justify-around border-b border-slate-50 overflow-x-auto no-scrollbar shadow-sm">
            <button class="px-5 py-4 text-[10px] font-black uppercase tab-active">Sumário</button>
            <button class="px-5 py-4 text-[10px] font-black uppercase text-slate-300">Estatísticas</button>
            <button class="px-5 py-4 text-[10px] font-black uppercase text-slate-300">Odds</button>
        </div>

        <div class="p-6 space-y-4" id="det-markets">
            </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-sky-50 flex justify-around p-6 z-50 rounded-t-[40px] shadow-2xl">
        <div class="flex flex-col items-center gap-1 text-sky-600 font-black text-[9px] uppercase"><span class="text-2xl">⚡</span>Tips</div>
        <a href="https://pay.kiwify.com.br/mj9n838" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase"><span class="text-2xl">💰</span>VIP Pix</a>
        <div class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase"><span class="text-2xl">👤</span>Perfil</div>
    </nav>

    <script>
        // NOVA FONTE DE IMAGENS (Google Favicon / Clearbit / Avatar)
        const getLogo = (name) => `https://www.google.com/s2/favicons?domain=${name.toLowerCase().replace(/ /g, '')}.com&sz=128`;
        const getLogoAlt = (name) => `https://ui-avatars.com/api/?name=${name}&background=0ea5e9&color=fff&bold=true`;

        const matches = [
            { id: 1, h: "Real Madrid", a: "Man City", l: "Champions League", logoH: "realmadrid", logoA: "mancity", markets: [
                { title: "🚩 ESCANTEIOS", desc: "Mais 9.5 Cantos", o: "1.85" },
                { title: "🎯 CHUTES AO GOL", desc: "Haaland 2+ Chutes", o: "1.70" }
            ]},
            { id: 2, h: "Flamengo", a: "Palmeiras", l: "Brasileirão", logoH: "flamengo", logoA: "palmeiras", markets: [
                { title: "🚩 ESCANTEIOS", desc: "Mais 10.5 Cantos", o: "1.92" },
                { title: "👤 PERFORMANCE", desc: "Ambos Marcam: Sim", o: "1.80" }
            ]},
            { id: 3, h: "Arsenal", a: "Bayern", l: "Champions League", logoH: "arsenal", logoA: "bayern", markets: [
                { title: "🎯 FINALIZAÇÕES", desc: "Arsenal +5.5 Chutes", o: "2.10" }
            ]}
        ];

        function renderHome() {
            document.getElementById('games-feed').innerHTML = matches.map(m => `
                <div onclick="openDetails(${m.id})" class="bg-white rounded-[30px] p-6 border border-sky-50 card-shadow active:scale-95 transition-all">
                    <p class="text-[8px] font-black text-slate-200 uppercase tracking-[2px] text-center mb-5 italic">${m.l}</p>
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col items-center flex-1">
                            <img src="${getLogo(m.h)}" onerror="this.src='${getLogoAlt(m.h)}'" class="team-logo">
                            <span class="text-[10px] font-black uppercase mt-3 text-slate-800">${m.h}</span>
                        </div>
                        <div class="flex flex-col items-center px-4">
                            <span class="text-[9px] font-black text-slate-100">VS</span>
                        </div>
                        <div class="flex flex-col items-center flex-1">
                            <img src="${getLogo(m.a)}" onerror="this.src='${getLogoAlt(m.a)}'" class="team-logo">
                            <span class="text-[10px] font-black uppercase mt-3 text-slate-800">${m.a}</span>
                        </div>
                    </div>
                    <div class="bg-sky-50 rounded-2xl p-3 mt-5 text-center border border-sky-100/50">
                        <span class="text-[9px] font-black text-sky-500 uppercase tracking-widest">Estatísticas Completas →</span>
                    </div>
                </div>
            `).join('');
        }

        function openDetails(id) {
            const m = matches.find(item => item.id === id);
            document.getElementById('det-league').innerText = m.l;
            document.getElementById('det-name-h').innerText = m.h;
            document.getElementById('det-name-a').innerText = m.a;
            document.getElementById('det-logo-h').src = getLogo(m.h);
            document.getElementById('det-logo-a').src = getLogo(m.a);
            
            // Tratamento de erro nos logos da página interna
            document.getElementById('det-logo-h').onerror = () => { document.getElementById('det-logo-h').src = getLogoAlt(m.h); };
            document.getElementById('det-logo-a').onerror = () => { document.getElementById('det-logo-a').src = getLogoAlt(m.a); };

            document.getElementById('det-markets').innerHTML = m.markets.map(mark => `
                <div class="bg-white p-5 rounded-[30px] border border-slate-100 shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-[8px] text-sky-500 font-black uppercase mb-1">${mark.title}</p>
                        <p class="text-[11px] font-black uppercase text-slate-900">${mark.desc}</p>
                    </div>
                    <div class="bg-slate-50 px-4 py-2 rounded-2xl text-center border border-slate-100">
                        <p class="text-[8px] text-slate-400 font-black">ODD</p>
                        <p class="text-xl font-black text-slate-900 tracking-tighter">@${mark.o}</p>
                    </div>
                </div>
            `).join('') + `
                <a href="https://pay.kiwify.com.br/mj9n838" class="block w-full bg-slate-900 text-white text-center py-5 rounded-[25px] font-black uppercase text-[10px] mt-6 shadow-2xl">
                    Ver Todos os Mercados VIP
                </a>
            `;
            
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('game-details').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetails() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('game-details').style.display = 'none';
        }

        renderHome();
    </script>
</body>
</html>
