<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Palpite-Bet | Estatísticas Oficiais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F4F7F9; color: #1A1C1E; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Estilo Calendário */
        .date-btn { color: #8E9194; font-weight: 800; text-align: center; min-width: 60px; cursor: pointer; }
        .date-btn.active { color: #000; position: relative; }
        .date-btn.active::after { content: ''; position: absolute; bottom: -5px; left: 25%; width: 50%; height: 3px; background: #EF4444; border-radius: 2px; }

        /* Estilo Liga */
        .league-row { background: #FFF; border-radius: 12px; border-left: 4px solid #0EA5E9; padding: 10px 15px; display: flex; align-items: center; gap: 8px; margin-top: 15px; }

        /* Card de Jogo */
        .match-card { background: #FFF; border-radius: 20px; padding: 16px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        
        /* Botão VIP Pulsante */
        .btn-pay { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #auth-modal, #pay-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white px-5 py-5 sticky top-0 z-50 border-b border-slate-100 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">Palpite-<span class="text-sky-500">Bet</span></h1>
            <p class="text-[8px] font-black text-sky-400 uppercase tracking-widest">Portal de Dicas Pro</p>
        </div>
        <button onclick="showPay()" class="btn-pay text-white px-4 py-2.5 rounded-xl text-[10px] font-black uppercase shadow-lg">Ativar VIP</button>
    </header>

    <div class="p-4">
        <div class="bg-white rounded-[25px] p-5 border border-slate-50 shadow-sm">
            <h3 class="text-[9px] font-black text-slate-400 uppercase mb-3">🔎 Scanner de Bilhetes</h3>
            <div class="flex gap-2">
                <input id="ticketInput" type="text" placeholder="Código da aposta..." class="flex-1 bg-slate-50 border border-slate-100 p-3 rounded-xl text-xs font-bold outline-none">
                <button onclick="checkAuth()" class="bg-slate-900 text-white px-5 rounded-xl font-black text-[9px] uppercase italic">Analisar</button>
            </div>
        </div>
    </div>

    <nav class="bg-white border-b border-slate-100 overflow-x-auto no-scrollbar flex py-3 px-4 gap-5">
        <div class="date-btn"><div>TER</div><div class="text-[11px]">07.04</div></div>
        <div class="date-btn"><div>QUA</div><div class="text-[11px]">08.04</div></div>
        <div class="date-btn active"><div class="text-red-500 italic">HOJE</div><div class="text-[11px]">09.04</div></div>
        <div class="date-btn"><div>SEX</div><div class="text-[11px]">10.04</div></div>
        <div class="date-btn"><div>SÁB</div><div class="text-[11px]">11.04</div></div>
    </nav>

    <main class="px-4" id="games-feed"></main>

    <div id="auth-modal">
        <div class="bg-white w-full max-w-xs rounded-[35px] p-8 text-center">
            <h4 class="text-lg font-black text-slate-900 uppercase italic">Criar Conta</h4>
            <p class="text-[10px] text-slate-400 font-bold mb-6">Acesso gratuito para membros.</p>
            <input type="text" id="userName" placeholder="Seu Nome" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs font-bold outline-none mb-4">
            <button onclick="confirmAuth()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase">Liberar Palpites</button>
        </div>
    </div>

    <div id="pay-modal">
        <div class="bg-white w-full max-w-xs rounded-[40px] p-8 text-center shadow-2xl border-2 border-sky-500">
            <div class="w-16 h-16 bg-sky-50 text-sky-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">💎</div>
            <h4 class="text-lg font-black text-slate-900 uppercase italic">Acesso VIP</h4>
            <p class="text-[10px] text-slate-400 font-bold mb-6">Desbloqueie sinais exclusivos e scanner ilimitado.</p>
            
            <a href="https://pay.kiwify.com.br/mj9n838" target="_blank" class="block w-full btn-pay text-white py-4 rounded-2xl font-black text-[11px] uppercase shadow-lg text-center mb-4">
                PAGAR COM PIX AGORA
            </a>
            
            <button onclick="closePay()" class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Acessar versão limitada</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-5 z-50 rounded-t-[30px] shadow-xl">
        <div class="flex flex-col items-center gap-1 text-red-500 font-black text-[8px] uppercase"><span class="text-xl">🏠</span>Hoje</div>
        <div onclick="showPay()" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[8px] uppercase"><span class="text-xl">📡</span>Ao Vivo</div>
        <div onclick="showPay()" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[8px] uppercase"><span class="text-xl">⭐</span>VIP</div>
    </nav>

    <script>
        let isRegistered = false;

        function checkAuth() {
            if(!isRegistered) {
                document.getElementById('auth-modal').style.display = 'flex';
            } else {
                showPay();
            }
        }

        function confirmAuth() {
            if(document.getElementById('userName').value.length < 2) return;
            isRegistered = true;
            document.getElementById('auth-modal').style.display = 'none';
            alert("Cadastro realizado! Aproveite os palpites gratuitos.");
        }

        function showPay() {
            document.getElementById('pay-modal').style.display = 'flex';
        }

        function closePay() {
            document.getElementById('pay-modal').style.display = 'none';
        }

        const matches = [
            { league: "LIBERTADORES", games: [{h: "Flamengo", a: "Palestino", o: "1.25"}, {h: "Atlético-MG", a: "Rosario", o: "1.60"}]},
            { league: "CHAMPIONS LEAGUE", games: [{h: "Real Madrid", a: "Man City", o: "2.10"}, {h: "Arsenal", a: "Bayern", o: "1.85"}]}
        ];

        function render() {
            const feed = document.getElementById('games-feed');
            feed.innerHTML = matches.map(lg => `
                <div class="league-row">
                    <span class="text-[9px] font-black text-slate-500 tracking-widest uppercase">${lg.league}</span>
                </div>
                ${lg.games.map(m => `
                    <div class="match-card" onclick="showPay()">
                        <div class="space-y-2 flex-1">
                            <p class="text-[11px] font-black uppercase text-slate-700">${m.h}</p>
                            <p class="text-[11px] font-black uppercase text-slate-700">${m.a}</p>
                        </div>
                        <div class="bg-sky-50 px-4 py-2 rounded-xl text-center border border-sky-100">
                            <p class="text-[7px] text-sky-400 font-black uppercase">Palpite</p>
                            <p class="text-[12px] font-black text-sky-600">@${m.o}</p>
                        </div>
                    </div>
                `).join('')}
            `).join('');
        }

        render();
    </script>
</body>
</html>
