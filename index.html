<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F8FAFC; color: #1e293b; min-height: 100vh; }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 100, 255, 0.06); }
        .pix-btn { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .team-logo { width: 48px; height: 48px; object-fit: contain; border-radius: 50%; background: #fff; padding: 5px; border: 1px solid #f1f5f9; }
        
        /* Modal de Cadastro */
        #auth-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 200; backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        
        /* Detalhes do Jogo - Estilo Flashscore */
        #game-details { display: none; position: fixed; inset: 0; background: #F8FAFC; z-index: 100; overflow-y: auto; }
        .tab-active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; }
    </style>
</head>
<body class="pb-32">

    <div id="main-content">
        <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-100 flex justify-between items-center rounded-b-[30px] shadow-sm">
            <div class="flex flex-col">
                <h1 class="text-2xl font-black italic text-slate-900 uppercase leading-none">Palpite<span class="text-sky-500">Bet</span></h1>
                <p class="text-[9px] font-black text-sky-400 uppercase tracking-widest mt-1">SISTEMA INTEGRADO VIP</p>
            </div>
            <a href="https://pay.kiwify.com.br/mj9n838" class="pix-btn text-white px-5 py-2.5 rounded-2xl text-[10px] font-black shadow-lg">VIP R$ 9,99</a>
        </header>

        <main class="max-w-md mx-auto p-5 space-y-6">
            
            <section class="bg-white rounded-[35px] p-7 border border-sky-50 card-shadow">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 flex items-center gap-2 italic">🔎 Scanner AI de Bilhetes</h3>
                <div class="space-y-3">
                    <input id="ticketInput" type="text" placeholder="Cole o código da sua aposta..." class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-sky-100">
                    <button onclick="checkAuth('analisar')" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest">Analisar Probabilidade</button>
                </div>
            </section>

            <nav class="overflow-x-auto no-scrollbar flex gap-4 py-2" id="sport-filters">
                <button onclick="filterGames('Futebol')" class="bg-sky-500 text-white text-[10px] font-black uppercase px-6 py-2.5 rounded-full whitespace-nowrap">⚽ Futebol</button>
                <button onclick="filterGames('NBA')" class="bg-white text-slate-400 text-[10px] font-black uppercase px-6 py-2.5 rounded-full border border-slate-100 whitespace-nowrap">🏀 NBA</button>
                <button onclick="filterGames('MMA')" class="bg-white text-slate-400 text-[10px] font-black uppercase px-6 py-2.5 rounded-full border border-slate-100 whitespace-nowrap">🥊 MMA</button>
            </nav>

            <div id="games-feed" class="space-y-4">
                </div>
        </main>
    </div>

    <div id="game-details">
        <div class="bg-slate-900 text-white p-5 flex items-center gap-4">
            <button onclick="closeDetails()" class="text-2xl font-bold">←</button>
            <span id="det-league" class="text-[10px] font-black uppercase tracking-[2px]"></span>
        </div>
        <div class="bg-white p-8 flex justify-between items-center border-b border-slate-100 shadow-sm">
            <div class="flex flex-col items-center gap-3 flex-1 text-center">
                <img id="det-logo-h" src="" class="team-logo">
                <span id="det-name-h" class="text-[11px] font-black uppercase mt-1"></span>
            </div>
            <div class="text-center flex-1 font-black text-3xl italic">VS</div>
            <div class="flex flex-col items-center gap-3 flex-1 text-center">
                <img id="det-logo-a" src="" class="team-logo">
                <span id="det-name-a" class="text-[11px] font-black uppercase mt-1"></span>
            </div>
        </div>
        <div class="bg-white flex justify-around border-b border-slate-50 shadow-sm">
            <button class="px-5 py-4 text-[10px] font-black uppercase tab-active">Sumário</button>
            <button class="px-5 py-4 text-[10px] font-black uppercase text-slate-300">Estatísticas</button>
            <button class="px-5 py-4 text-[10px] font-black uppercase text-slate-300">Odds</button>
        </div>
        <div class="p-6 space-y-4" id="det-markets"></div>
    </div>

    <div id="auth-modal">
        <div class="bg-white w-full max-w-xs rounded-[40px] p-8 text-center shadow-2xl">
            <h4 class="text-lg font-black text-slate-900 uppercase italic">Acesso Restrito</h4>
            <p class="text-[10px] text-slate-400 font-bold mb-6">Crie sua conta para liberar as análises.</p>
            <div class="space-y-3">
                <input type="text" id="regName" placeholder="Nome" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs font-bold outline-none">
                <input type="email" id="regEmail" placeholder="E-mail" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs font-bold outline-none">
                <button onclick="saveUser()" class="w-full pix-btn text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg">Cadastrar Grátis</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-sky-50 flex justify-around p-6 z-50 rounded-t-[40px] shadow-2xl">
        <div class="flex flex-col items-center gap-1 text-sky-600 font-black text-[9px] uppercase"><span class="text-2xl">⚡</span>Tips</div>
        <a href="https://pay.kiwify.com.br/mj9n838" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase"><span class="text-2xl">💰</span>VIP Pix</a>
        <div onclick="checkAuth('perfil')" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase cursor-pointer"><span class="text-2xl">👤</span>Perfil</div>
    </nav>

    <script>
        let userIsLogged = false;
        const getLogo = (name) => `https://www.google.com/s2/favicons?domain=${name.toLowerCase().replace(/ /g, '')}.com&sz=128`;
        const getLogoAlt = (name) => `https://ui-avatars.com/api/?name=${name}&background=0ea5e9&color=fff&bold=true`;

        // JOGOS DE HOJE (Futebol e NBA)
        const matches = [
            { id: 1, h: "Real Madrid", a: "Man City", l: "Champions League", cat: "Futebol", markets: [{title: "🚩 ESCANTEIOS", desc: "Mais 9.5 Cantos", o: "1.85"}] },
            { id: 2, h: "Arsenal", a: "Bayern", l: "Champions League", cat: "Futebol", markets: [{title: "🎯 CHUTES AO GOL", desc: "Harry Kane 1+ Chute", o: "1.65"}] },
            { id: 3, h: "Lakers", a: "Warriors", l: "NBA", cat: "NBA", markets: [{title: "🏀 PONTOS", desc: "LeBron James 25.5+", o: "1.82"}] },
            { id: 4, h: "Flamengo", a: "Palestino", l: "Libertadores", cat: "Futebol", markets: [{title: "🚩 ESCANTEIOS", desc: "Mais 10.5 Cantos", o: "1.90"}] },
            { id: 5, h: "Celtics", a: "Bucks", l: "NBA", cat: "NBA", markets: [{title: "🏀 TRIPLOS", desc: "Tatum 3+ Triplos", o: "2.10"}] }
        ];

        function checkAuth(action) {
            if(!userIsLogged) {
                document.getElementById('auth-modal').style.display = 'flex';
                return;
            }
            if(action === 'analisar') {
                alert("Bilhete analisado! Risco Médio. Assine o VIP para ver o relatório completo.");
                window.location.href = "https://pay.kiwify.com.br/mj9n838";
            }
        }

        function saveUser() {
            if(!document.getElementById('regName').value) return alert("Preencha seu nome");
            userIsLogged = true;
            document.getElementById('auth-modal').style.display = 'none';
            alert("Sucesso! Explore as estatísticas agora.");
            renderHome();
        }

        function filterGames(category) {
            const filtered = category === 'Todos' ? matches : matches.filter(m => m.cat === category);
            renderHome(filtered);
            // Atualiza botões
            const buttons = document.querySelectorAll('#sport-filters button');
            buttons.forEach(btn => {
                btn.className = btn.innerText.includes(category) ? "bg-sky-500 text-white text-[10px] font-black uppercase px-6 py-2.5 rounded-full whitespace-nowrap" : "bg-white text-slate-400 text-[10px] font-black uppercase px-6 py-2.5 rounded-full border border-slate-100 whitespace-nowrap";
            });
        }

        function renderHome(data = matches) {
            document.getElementById('games-feed').innerHTML = data.map(m => `
                <div onclick="openDetails(${m.id})" class="bg-white rounded-[35px] p-6 border border-sky-50 card-shadow">
                    <p class="text-[8px] font-black text-slate-200 uppercase tracking-[2px] text-center mb-5 italic">${m.l}</p>
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col items-center flex-1">
                            <img src="${getLogo(m.h)}" onerror="this.src='${getLogoAlt(m.h)}'" class="team-logo">
                            <span class="text-[10px] font-black uppercase mt-3 text-slate-800">${m.h}</span>
                        </div>
                        <span class="text-[10px] font-black text-slate-100">VS</span>
                        <div class="flex flex-col items-center flex-1">
                            <img src="${getLogo(m.a)}" onerror="this.src='${getLogoAlt(m.a)}'" class="team-logo">
                            <span class="text-[10px] font-black uppercase mt-3 text-slate-800">${m.a}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openDetails(id) {
            if(!userIsLogged) return checkAuth();
            const m = matches.find(item => item.id === id);
            document.getElementById('det-league').innerText = m.l;
            document.getElementById('det-name-h').innerText = m.h;
            document.getElementById('det-name-a').innerText = m.a;
            document.getElementById('det-logo-h').src = getLogo(m.h);
            document.getElementById('det-logo-a').src = getLogo(m.a);
            document.getElementById('det-markets').innerHTML = m.markets.map(mark => `
                <div class="bg-white p-5 rounded-[30px] border border-slate-100 shadow-sm flex justify-between items-center">
                    <div><p class="text-[8px] text-sky-500 font-black uppercase mb-1">${mark.title}</p><p class="text-[11px] font-black uppercase text-slate-900">${mark.desc}</p></div>
                    <div class="bg-slate-50 px-4 py-2 rounded-2xl text-center border border-slate-100"><p class="text-[8px] text-slate-400 font-black">ODD</p><p class="text-xl font-black text-slate-900">@${mark.o}</p></div>
                </div>
            `).join('') + `<a href="https://pay.kiwify.com.br/mj9n838" class="block w-full bg-slate-900 text-white text-center py-5 rounded-[25px] font-black uppercase text-[10px] mt-4">Liberar Grade VIP de ${m.cat}</a>`;
            
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('game-details').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetails() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('game-details').style.display = 'none';
        }

        renderHome();
    </script>
</body>
</html>
