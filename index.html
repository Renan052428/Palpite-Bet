<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Elite - VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F8FAFC; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 15px 35px -5px rgba(0, 100, 255, 0.08); }
        .pix-btn { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); }
        .scanner-line { height: 3px; background: #0ea5e9; position: absolute; width: 100%; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #0ea5e9; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .team-logo { width: 50px; height: 50px; object-fit: contain; background: white; border-radius: 50%; padding: 4px; border: 1px solid #f1f5f9; }
        .badge-vip { background: #0c4a6e; color: white; padding: 2px 8px; border-radius: 6px; font-weight: bold; font-size: 9px; }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-100 rounded-b-[40px] shadow-sm flex justify-between items-center">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black italic text-slate-900 uppercase leading-none">Palpite<span class="text-sky-500">Bet</span></h1>
            <p class="text-[9px] font-black text-sky-400 uppercase tracking-widest mt-1">Estatísticas & VIP</p>
        </div>
        <a href="https://pay.kiwify.com.br/mj9n838" class="pix-btn text-white px-5 py-2.5 rounded-2xl text-[10px] font-black shadow-lg active:scale-95 transition-all">
            VIP R$ 9,99
        </a>
    </header>

    <nav class="bg-white/90 backdrop-blur-md sticky top-[84px] z-40 overflow-x-auto no-scrollbar flex gap-4 px-6 py-4 border-b border-slate-50">
        <button class="bg-sky-500 text-white text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">⚽ Grade Completa</button>
        <button class="bg-slate-100 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🚩 Escanteios</button>
        <button class="bg-slate-100 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🎯 Chutes</button>
        <button class="bg-slate-100 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🏀 NBA</button>
    </nav>

    <main class="max-w-md mx-auto p-5 space-y-8">

        <section class="bg-white rounded-[40px] p-7 border border-sky-50 card-shadow relative overflow-hidden">
            <div id="scanLine" class="hidden scanner-line"></div>
            <h3 class="text-xs font-black text-slate-800 uppercase mb-4 flex items-center gap-2">🔎 Analisador de Bilhetes AI</h3>
            <div class="space-y-3">
                <input id="ticketInput" type="text" placeholder="Cole o código do seu bilhete..." class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs font-bold outline-none focus:ring-2 focus:ring-sky-200">
                <button onclick="startAnalysis()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all">Verificar Probabilidade</button>
            </div>
        </section>

        <div id="master-feed" class="space-y-6">
            </div>

        <div class="bg-slate-900 rounded-[40px] p-8 text-white card-shadow text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10 text-4xl font-black italic">VIP</div>
            <h4 class="text-xl font-black mb-1 uppercase italic tracking-tight">Grade Vip 24h</h4>
            <p class="text-[10px] opacity-60 font-bold mb-6 uppercase tracking-widest">Receba palpites de performance em tempo real.</p>
            <a href="https://pay.kiwify.com.br/mj9n838" class="block w-full bg-sky-500 text-white py-4 rounded-2xl font-black uppercase text-[11px] shadow-lg">Liberar Grade Completa</a>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-sky-50 flex justify-around p-6 z-50 rounded-t-[40px] shadow-2xl">
        <div class="flex flex-col items-center gap-1 text-sky-600 font-black text-[9px] uppercase"><span class="text-2xl">⚡</span>Tips</div>
        <a href="https://pay.kiwify.com.br/mj9n838" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase"><span class="text-2xl">💰</span>VIP Pix</a>
        <div class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase"><span class="text-2xl">👤</span>Perfil</div>
    </nav>

    <script>
        // Sistema Anti-Erro de Imagem
        const getLogo = (id) => `https://api.sofascore.app/api/v1/team/${id}/image`;

        function startAnalysis() {
            const input = document.getElementById('ticketInput').value;
            if(!input) return alert("Por favor, cole o código do seu bilhete!");
            const line = document.getElementById('scanLine');
            line.classList.remove('hidden');
            setTimeout(() => {
                line.classList.add('hidden');
                alert("Risco detectado! Para ver a probabilidade de Green e análise detalhada do bilhete, acesse o VIP.");
                window.location.href = "https://pay.kiwify.com.br/mj9n838";
            }, 2000);
        }

        const matches = [
            { h: "Real Madrid", a: "Man City", l: "Champions League", type: "🚩 ESCANTEIOS", t: "Mais 9.5 Escanteios", o: "1.85", idH: "86", idA: "50", p: "94%" },
            { h: "Haaland (City)", a: "Real Madrid", l: "PLAYER PROPS", type: "🎯 CHUTES AO GOL", t: "2+ Chutes ao Gol", o: "1.70", idH: "50", idA: "86", p: "89%" },
            { h: "Flamengo", a: "Palmeiras", l: "Brasileirão", type: "🚩 ESCANTEIOS", t: "Mais 10.5 Escanteios", o: "1.90", idH: "5981", idA: "1053", p: "91%" },
            { h: "Vini Jr (Real)", a: "Man City", l: "ESTATÍSTICAS", type: "🎯 FINALIZAÇÕES", t: "1+ Chute ao Gol", o: "1.55", idH: "86", idA: "50", p: "95%" },
            { h: "Lakers", a: "Warriors", l: "NBA", type: "🏀 PONTOS", t: "LeBron James 25+ Pontos", o: "1.82", idH: "3427", idA: "3428", p: "88%" },
            { h: "Chelsea", a: "Man Utd", l: "Premier League", type: "🚩 ESCANTEIOS", t: "Mais 8.5 Escanteios", o: "1.65", idH: "38", idA: "35", p: "84%" },
            { h: "Poatan", a: "Hill", l: "UFC", type: "🥊 VENCEDOR", t: "Vitória Alex Poatan", o: "1.60", idH: "394747", idA: "254427", p: "90%" },
            { h: "Barcelona", a: "PSG", l: "Champions League", type: "🚩 ESCANTEIOS", t: "Mais 9.5 Escanteios", o: "1.78", idH: "83", idA: "524", p: "92%" },
            { h: "Mbappé (PSG)", a: "Barcelona", l: "PLAYER PROPS", type: "🎯 CHUTES TOTAIS", t: "3+ Chutes Totais", o: "1.80", idH: "524", idA: "83", p: "87%" },
            { h: "Atlético-MG", a: "Cruzeiro", l: "Mineiro", type: "🚩 ESCANTEIOS", t: "Mais 10.5 Escanteios", o: "1.95", idH: "1029", idA: "1108", p: "89%" },
            { h: "Celtics", a: "Bulls", l: "NBA", type: "🏀 TRIPLOS", t: "Tatum 3+ Triplos", o: "2.10", idH: "3427", idA: "3428", p: "83%" },
            { h: "Salah (Liv)", a: "Chelsea", l: "PLAYER PROPS", type: "🎯 FINALIZAÇÕES", t: "2+ Chutes ao Gol", o: "1.90", idH: "44", idA: "38", p: "91%" }
        ];

        document.getElementById('master-feed').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-7 border border-sky-50 card-shadow relative">
                <div class="absolute top-0 right-0 bg-sky-500 text-white text-[9px] px-5 py-2.5 rounded-bl-[20px] font-black italic">${m.p} CONF.</div>
                
                <p class="text-[9px] font-black text-slate-200 uppercase mb-6 tracking-[3px] text-center italic">${m.l}</p>
                
                <div class="flex items-center justify-between mb-8">
                    <div class="flex flex-col items-center gap-2 flex-1">
                        <img src="${getLogo(m.idH)}" onerror="this.src='https://ui-avatars.com/api/?name=${m.h}&background=0ea5e9&color=fff'" class="team-logo">
                        <p class="text-[10px] font-black text-slate-800 uppercase text-center leading-tight">${m.h}</p>
                    </div>
                    <div class="text-[10px] font-black text-slate-100 italic px-2">VS</div>
                    <div class="flex flex-col items-center gap-2 flex-1">
                        <img src="${getLogo(m.idA)}" onerror="this.src='https://ui-avatars.com/api/?name=${m.a}&background=0ea5e9&color=fff'" class="team-logo">
                        <p class="text-[10px] font-black text-slate-800 uppercase text-center leading-tight">${m.a}</p>
                    </div>
                </div>

                <div class="bg-sky-50 rounded-3xl p-4 flex justify-between items-center border border-sky-100">
                    <div class="flex-1">
                        <p class="text-[8px] text-sky-400 font-black uppercase mb-1">${m.type}</p>
                        <p class="text-[11px] uppercase font-black text-slate-950 flex items-center gap-1">
                            ${m.h.includes('(') ? '<span class="badge-vip">PROPS</span>' : ''} ${m.t}
                        </p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] text-slate-400 font-black uppercase mb-1">Odd</p>
                        <span class="text-2xl font-black text-slate-900 leading-none tracking-tighter">@${m.o}</span>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
