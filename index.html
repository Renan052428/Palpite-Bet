<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Elite - VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F8FAFC; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 15px 35px -5px rgba(0, 100, 255, 0.08); }
        .pix-btn { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); }
        .scanner-line { height: 3px; background: #0ea5e9; position: absolute; width: 100%; top: 0; animation: scan 2s linear infinite; box-shadow: 0 0 15px #0ea5e9; }
        @keyframes scan { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .team-logo { width: 50px; height: 50px; object-fit: contain; }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-100 rounded-b-[40px] shadow-sm flex justify-between items-center">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black italic text-slate-900 uppercase leading-none">Palpite<span class="text-sky-500">Bet</span></h1>
            <p class="text-[9px] font-black text-sky-400 uppercase tracking-widest mt-1">Inteligência VIP</p>
        </div>
        <a href="https://pay.kiwify.com.br/mj9n838" class="pix-btn text-white px-5 py-2.5 rounded-2xl text-[10px] font-black shadow-lg shadow-sky-200 active:scale-95 transition-all">
            VIP R$ 9,99
        </a>
    </header>

    <nav class="bg-white/80 backdrop-blur-md sticky top-[84px] z-40 overflow-x-auto no-scrollbar flex gap-6 px-6 py-4 border-b border-slate-50">
        <button class="text-[10px] font-black uppercase text-sky-50 border-b-2 border-sky-500 bg-sky-500 px-4 py-1.5 rounded-full whitespace-nowrap">⚽ Futebol</button>
        <button class="text-[10px] font-black uppercase text-slate-400 whitespace-nowrap">🏀 NBA</button>
        <button class="text-[10px] font-black uppercase text-slate-400 whitespace-nowrap">🥊 MMA</button>
        <button class="text-[10px] font-black uppercase text-slate-400 whitespace-nowrap">🎾 Tênis</button>
    </nav>

    <main class="max-w-md mx-auto p-5 space-y-8">

        <section class="bg-white rounded-[40px] p-7 border border-sky-50 card-shadow relative overflow-hidden">
            <div id="scanLine" class="hidden scanner-line"></div>
            <h3 class="text-xs font-black text-slate-800 uppercase mb-4 flex items-center gap-2">🔎 Scanner de Bilhetes AI</h3>
            <div class="space-y-3">
                <input id="ticketInput" type="text" placeholder="Cole o ID ou Link da Aposta..." class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl text-xs font-bold outline-none">
                <button onclick="startAnalysis()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all">Analisar Agora</button>
            </div>
        </section>

        <div id="games-feed" class="space-y-6">
            </div>

        <div class="bg-slate-900 rounded-[40px] p-8 text-white card-shadow relative overflow-hidden text-center">
            <h4 class="text-xl font-black mb-2 uppercase italic">Acesso Ilimitado</h4>
            <p class="text-[10px] opacity-60 font-bold mb-6 uppercase tracking-widest">Libere todos os palpites e o analisador</p>
            <a href="https://pay.kiwify.com.br/mj9n838" class="block w-full bg-sky-500 text-white py-4 rounded-2xl font-black uppercase text-[11px] shadow-lg shadow-sky-500/20">Pagar R$ 9,99 via PIX</a>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-sky-50 flex justify-around p-6 z-50 rounded-t-[40px] shadow-2xl">
        <div class="flex flex-col items-center gap-1 text-sky-600"><span class="text-2xl">⚡</span><p class="text-[8px] font-black uppercase">Tips</p></div>
        <a href="https://pay.kiwify.com.br/mj9n838" class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-2xl">💰</span><p class="text-[8px] font-black uppercase">VIP PIX</p>
        </a>
        <div class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">👤</span><p class="text-[8px] font-black uppercase">Conta</p></div>
    </nav>

    <script>
        function startAnalysis() {
            const input = document.getElementById('ticketInput').value;
            if(!input) return alert("Por favor, cole o bilhete!");
            const line = document.getElementById('scanLine');
            line.classList.remove('hidden');
            setTimeout(() => {
                line.classList.add('hidden');
                alert("Scanner identificou padrões de risco! Libere o acesso VIP por R$ 9,99 para ver a análise detalhada do bilhete.");
                window.location.href = "https://pay.kiwify.com.br/mj9n838";
            }, 2000);
        }

        const matches = [
            { h: "Real Madrid", a: "Man. City", l: "Champions League", t: "Vitória Casa", o: "1.95", idH: "86", idA: "50", sport: "⚽" },
            { h: "Lakers", a: "Warriors", l: "NBA", t: "Vencedor: Lakers", o: "1.82", idH: "3427", idA: "3428", sport: "🏀" },
            { h: "Flamengo", a: "Palmeiras", l: "Brasileirão A", t: "Ambos Marcam", o: "1.75", idH: "5981", idA: "1053", sport: "⚽" },
            { h: "Charles Bronx", a: "Makhachev", l: "UFC", t: "Vitória: Bronx", o: "2.10", idH: "254427", idA: "394747", sport: "🥊" }
        ];

        document.getElementById('games-feed').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-7 border border-sky-50 card-shadow relative">
                <div class="flex justify-between items-center mb-5">
                    <span class="text-[9px] font-black text-slate-200 uppercase tracking-widest">${m.sport} ${m.l}</span>
                    <span class="text-[9px] font-black text-sky-500 italic">HOJE</span>
                </div>
                <div class="flex items-center justify-between mb-8">
                    <div class="flex flex-col items-center gap-2 flex-1">
                        <img src="https://api.sofascore.app/api/v1/team/${m.idH}/image" class="team-logo" onerror="this.src='https://wiki.sofascore.app/images/d/d4/Placeholder_Team.png'">
                        <p class="text-[10px] font-black text-slate-800 uppercase text-center">${m.h}</p>
                    </div>
                    <div class="text-[10px] font-black text-slate-100">VS</div>
                    <div class="flex flex-col items-center gap-2 flex-1">
                        <img src="https://api.sofascore.app/api/v1/team/${m.idA}/image" class="team-logo" onerror="this.src='https://wiki.sofascore.app/images/d/d4/Placeholder_Team.png'">
                        <p class="text-[10px] font-black text-slate-800 uppercase text-center">${m.a}</p>
                    </div>
                </div>
                <div class="bg-sky-50 rounded-3xl p-5 flex justify-between items-center border border-sky-100">
                    <div>
                        <p class="text-[8px] text-sky-400 font-black uppercase">Sugestão AI</p>
                        <p class="text-xs uppercase font-black ${m.t.includes('Vitória') || m.t.includes('Vencedor') ? 'text-green-600' : 'text-slate-950'}">${m.t}</p>
                    </div>
                    <span class="text-2xl font-black text-slate-950 tracking-tighter">@${m.o}</span>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
