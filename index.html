<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 20px 40px -10px rgba(0, 100, 255, 0.1); }
        /* Estilo para quando a imagem falha */
        .img-fallback { 
            width: 48px; height: 48px; 
            background: #f1f5f9; border-radius: 12px;
            display: flex; items-center; justify-content: center;
            font-weight: 800; color: #94a3b8; border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] pb-24">

    <header class="bg-white p-7 sticky top-0 z-50 border-b border-sky-50 rounded-b-[40px] shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] font-black text-sky-500 uppercase tracking-[2px]">Inteligência Pro</p>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-slate-900">Palpite<span class="text-sky-500">Bet</span></h1>
            </div>
            <div class="bg-slate-900 px-4 py-2 rounded-2xl text-white font-black text-[10px]">AI PRO</div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-6">
        
        <div class="flex justify-between items-center px-2">
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Dicas da Rodada</h3>
            <span class="flex items-center gap-1.5 text-[10px] text-sky-600 font-bold bg-sky-50 px-3 py-1.5 rounded-full border border-sky-100">
                <span class="w-2 h-2 bg-sky-500 rounded-full animate-pulse"></span> AO VIVO
            </span>
        </div>

        <div id="prediction-list" class="space-y-6">
            </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 flex justify-around p-6 z-50 rounded-t-[32px]">
        <div class="flex flex-col items-center gap-1 text-sky-600"><span class="text-2xl">🏠</span><p class="text-[10px] font-black uppercase">Início</p></div>
        <div class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">📡</span><p class="text-[10px] font-black uppercase">Live</p></div>
        <div class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">🏆</span><p class="text-[10px] font-black uppercase">Ligas</p></div>
    </nav>

    <script>
        // Cores automáticas pedidas
        function getTipStyle(tip) {
            const t = tip.toLowerCase();
            if (t.includes('vitória')) return 'text-green-600 font-bold';
            if (t.includes('ambos marcam')) return 'text-slate-950 font-black';
            return 'text-sky-600';
        }

        // Função para carregar logos da Wikipedia (Super estável)
        function getLogo(team) {
            // Remove espaços e caracteres especiais para a busca
            const query = encodeURIComponent(team + " logo football");
            return `https://duckduckgo.com/i/8593683a.png`; // Placeholder fixo de alta qualidade
        }

        const matches = [
            { h: "Barcelona", a: "Real Madrid", league: "La Liga", tip: "Vitória Casa", odd: "1.90", conf: "94%" },
            { h: "Man City", a: "Liverpool", league: "Premier League", tip: "Ambos Marcam", odd: "1.62", conf: "91%" },
            { h: "Palmeiras", a: "Flamengo", league: "Brasileirão", tip: "Vitória Mandante", odd: "1.85", conf: "88%" }
        ];

        document.getElementById('prediction-list').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-8 border border-sky-50 card-shadow relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-sky-500 text-white text-[9px] px-5 py-2.5 rounded-bl-[24px] font-black italic">${m.conf} CONF.</div>
                
                <p class="text-[10px] font-bold text-slate-300 uppercase mb-6 tracking-[2px] text-center">${m.league}</p>
                
                <div class="flex items-center justify-between mb-8">
                    <div class="flex flex-col items-center gap-3 flex-1">
                        <div class="relative">
                            <img src="https://img.logo.dev/${m.h.toLowerCase().replace(/\s/g, '')}.com?token=pk_abc123" 
                                 onerror="this.parentElement.innerHTML='<div class=\'img-fallback\'>${m.h[0]}</div>'" 
                                 class="w-12 h-12 object-contain">
                        </div>
                        <p class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">${m.h}</p>
                    </div>

                    <div class="px-4 text-slate-100 font-black italic text-sm">VS</div>

                    <div class="flex flex-col items-center gap-3 flex-1">
                        <div class="relative">
                            <img src="https://img.logo.dev/${m.a.toLowerCase().replace(/\s/g, '')}.com?token=pk_abc123" 
                                 onerror="this.parentElement.innerHTML='<div class=\'img-fallback\'>${m.a[0]}</div>'" 
                                 class="w-12 h-12 object-contain">
                        </div>
                        <p class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">${m.a}</p>
                    </div>
                </div>

                <div class="bg-sky-50/50 rounded-3xl p-5 flex justify-between items-center border border-sky-100">
                    <div>
                        <p class="text-[9px] text-sky-400 font-black uppercase tracking-widest">Sugestão VIP</p>
                        <p class="text-sm uppercase ${getTipStyle(m.tip)}">${m.tip}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Odd</p>
                        <p class="text-2xl font-black text-slate-900 tracking-tighter">@${m.odd}</p>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
