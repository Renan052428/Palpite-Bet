<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Ajuste do container do placar para esconder o lixo do site original */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 75vh; /* Ocupa a maior parte da tela */
            overflow: hidden;
            border-radius: 24px;
            background: white;
        }
        
        iframe {
            position: absolute;
            top: -120px; /* Sobe o site para esconder o menu do fornecedor */
            left: 0;
            width: 100%;
            height: calc(100% + 120px);
            border: none;
        }
    </style>
</head>
<body class="bg-slate-50 pb-20">

    <header class="bg-gradient-to-r from-pink-600 to-purple-700 text-white p-5 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-black italic tracking-tighter uppercase text-white">PalpiteBet</h1>
            <div class="flex gap-4">
                <span class="opacity-80">🔍</span>
                <span class="opacity-80">👤</span>
            </div>
        </div>
        
        <div class="max-w-md mx-auto mt-4 flex gap-5 overflow-x-auto no-scrollbar text-[10px] font-bold uppercase whitespace-nowrap">
            <div class="flex flex-col items-center opacity-40"><span>DOM</span><span>05.04</span></div>
            <div class="flex flex-col items-center opacity-40"><span>SEG</span><span>06.04</span></div>
            <div class="flex flex-col items-center border-b-2 border-white pb-1"><span>HOJE</span><span>08.04</span></div>
            <div class="flex flex-col items-center opacity-40"><span>QUI</span><span>09.04</span></div>
            <div class="flex flex-col items-center opacity-40"><span>SEX</span><span>10.04</span></div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-5">
        
        <section class="bg-white rounded-[32px] p-6 shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Sugestão de Hoje</span>
                <span class="bg-green-100 text-green-600 text-[10px] px-2 py-1 rounded-full font-bold">94% Confiança</span>
            </div>
            
            <div class="text-center mb-5">
                <p class="text-xs text-slate-500 font-medium">Champions League</p>
                <h2 class="font-bold text-slate-800 text-lg">Real Madrid vs Man. City</h2>
            </div>
            
            <div class="bg-pink-50 rounded-2xl p-4 flex justify-between items-center">
                <div>
                    <p class="text-[9px] text-pink-400 font-bold uppercase">Mercado</p>
                    <p class="font-bold text-pink-600">Mais de 2.5 Gols</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] text-slate-400 font-bold uppercase">Odd</p>
                    <p class="font-black text-slate-900 text-xl">1.72</p>
                </div>
            </div>
        </section>

        <section class="space-y-3">
            <div class="flex justify-between items-center px-2">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Jogos ao Vivo</h3>
                <div class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-ping"></span>
                    <span class="text-[10px] font-bold text-red-500 uppercase">Live</span>
                </div>
            </div>
            
            <div class="iframe-wrapper shadow-inner border border-slate-200">
                <iframe src="https://m.livescore.bz/" scrolling="yes"></iframe>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-3 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button class="flex flex-col items-center gap-1">
            <span class="text-xl">🏠</span>
            <span class="text-[10px] font-bold text-pink-600 uppercase">Hoje</span>
        </button>
        <button class="flex flex-col items-center gap-1 opacity-30">
            <span class="text-xl">📡</span>
            <span class="text-[10px] font-bold text-slate-400 uppercase">Ao Vivo</span>
        </button>
        <button class="flex flex-col items-center gap-1 opacity-30">
            <span class="text-xl">⭐</span>
            <span class="text-[10px] font-bold text-slate-400 uppercase">Favoritos</span>
        </button>
        <button class="flex flex-col items-center gap-1 opacity-30">
            <span class="text-xl">🏆</span>
            <span class="text-[10px] font-bold text-slate-400 uppercase">Ligas</span>
        </button>
    </nav>

</body>
</html>
