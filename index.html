<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; background: #F8FAFC; color: #1e293b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 15px 35px -5px rgba(0, 100, 255, 0.08); }
        .card-shadow-blue { box-shadow: 0 10px 20px -3px rgba(14, 165, 233, 0.2); }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white p-7 sticky top-0 z-50 shadow-sm border-b border-sky-100 rounded-b-[40px]">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <p class="text-[10px] font-black text-sky-500 uppercase tracking-[2px]">Inteligência Pro</p>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-slate-900 leading-none">Palpite<span class="text-sky-500">Bet</span></h1>
            </div>
            <div class="flex gap-2">
                <div class="bg-sky-50 p-3 rounded-2xl border border-sky-100 text-sky-500">🔍</div>
                <div class="bg-slate-900 px-4 py-2 rounded-2xl text-white font-black text-[10px] flex items-center shadow-lg shadow-slate-200">AI PRO</div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-7">
        
        <div class="flex justify-between items-center px-1">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-[2px]">Palpites de Hoje</h3>
            <span class="text-[10px] bg-sky-50 text-sky-600 px-3 py-1.5 rounded-full font-bold border border-sky-100 flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 bg-sky-500 rounded-full animate-pulse"></span> AO VIVO
            </span>
        </div>

        <div id="games-container" class="space-y-6">
            </div>

        <div class="space-y-3">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[2px] ml-1">🔥 Bilhete Pronto</h3>
            <button onclick="alert('Funcionalidade em desenvolvimento')" class="w-full text-white card-shadow-blue p-1 rounded-[32px] overflow-hidden" style="background: linear-gradient(135deg, #0ea5e9 0%, #0c4a6e 100%);">
                <div class="bg-slate-900/50 rounded-[28px] p-6 space-y-4">
                    <div class="flex justify-between items-center border-b border-white/10 pb-3">
                        <span class="text-xs italic opacity-70">Real Madrid vs City</span>
                        <span class="text-xs font-black text-green-400">AMBOS MARCAM</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs italic opacity-70">Arsenal vs Bayern</span>
                        <span class="text-xs font-black text-green-400">VITÓRIA CASA</span>
                    </div>
                    <p class="w-full bg-white text-slate-950 font-black text-center text-[10px] p-3 rounded-2xl uppercase tracking-widest mt-2 active:bg-green-100 transition-colors">Copiar Bilhete (Odd 3.50)</p>
                </div>
            </button>
        </div>

        <section class="bg-white rounded-[40px] p-8 card-shadow border border-sky-50 space-y-3 relative">
            <div class="absolute top-0 right-0 bg-sky-500 text-white text-[8px] px-4 py-1.5 rounded-bl-xl font-black italic">GESTOR PRO</div>
            <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">🧮 Simulador de Meta</h3>
            
            <input id="vlr" type="number" placeholder="Banca Total R$" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-xl text-xs outline-none focus:ring-1 focus:ring-sky-300">
            <input id="odd" type="number" placeholder="Odd do Palpite (ex: 2.10)" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-xl text-xs outline-none focus:ring-1 focus:ring-sky-300">
            
            <button onclick="calc()" class="w-full bg-sky-500 text-white py-4 rounded-xl font-black uppercase text-xs shadow-lg shadow-sky-200">Sugerir Entrada</button>
            <p id="res" class="text-center mt-3 text-[11px] font-bold text-sky-600 hidden italic"></p>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 flex justify-around p-6 z-50 rounded-t-[40px] shadow-[0_-15px_40px_rgba(0,0,0,0.03)]">
        <div class="flex flex-col items-center gap-1 text-sky-600"><span class="text-2xl">🏠</span><p class="text-[9px] font-black uppercase">Início</p></div>
        <div class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">📡</span><p class="text-[9px] font-black uppercase">Live</p></div>
        <div class="flex flex-col items-center gap-1 text-slate-300"><span class="text-2xl">🏆</span><p class="text-[9px] font-black uppercase">Ligas</p></div>
    </nav>

    <script>
        // Lógica de cores conforme pedido original
        function getTipStyle(tip) {
            const t = tip.toLowerCase();
            // Vitória sempre VERDE
            if (t.includes('vitória')) return 'text-green-600 font-bold';
            // Ambos marcam sempre PRETO
            if (t.includes('ambos marcam')) return 'text-black font-black';
            return 'text-sky-600';
        }

        // Função do Simulador
        function calc() {
            const v = document.getElementById('vlr').value;
            const r = document.getElementById('res');
            if(v) {
                const stake = (v * 0.03).toFixed(2);
                r.innerHTML = `Entrada segura (3% da banca): R$ ${stake}`;
                r.classList.remove('hidden');
            }
        }

        // LISTA DE JOGOS AUTOMÁTICA (Para carregar certo, usei imagens estáticas de alta qualidade)
        const matches = [
            { h: "Barcelona", a: "Atl. Madrid", hLogo: "81", aLogo: "Atlético_Madrid", liga: "La Liga", tip: "Vitória Casa", odd: "1.90", conf: "94%" },
            { h: "Man. City", a: "Liverpool", hLogo: "50", aLogo: "Liverpool_FC", liga: "Premier League", tip: "Ambos Marcam", odd: "1.62", conf: "91%" },
            { h: "Palmeiras", a: "Flamengo", hLogo: "1053", aLogo: "Flamengo", liga: "Brasileirão", tip: "Vitória Mandante", odd: "1.85", conf: "88%" }
        ];

        document.getElementById('games-container').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-8 border border-sky-50 card-shadow relative overflow-hidden active:scale-95 transition-transform">
                <div class="absolute top-0 right-0 bg-sky-500 text-white text-[9px] px-5 py-2.5 rounded-bl-[24px] font-black italic">${m.conf} CONF.</div>
                
                <p class="text-[10px] font-bold text-slate-300 uppercase mb-6 tracking-[3px] text-center italic">${m.liga}</p>
                
                <div class="flex items-center justify-between mb-8 px-2">
                    <div class="flex flex-col items-center gap-3 flex-1 text-center">
                        <img src="https://api.sofascore.app/api/v1/team/${m.hLogo}/image" class="w-12 h-12 object-contain filter drop-shadow-lg">
                        <p class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">${m.h}</p>
                    </div>
                    <div class="px-2 text-slate-100 font-black italic text-xs tracking-widest opacity-40 VS text-xl">VS</div>
                    <div class="flex flex-col items-center gap-3 flex-1 text-center">
                        <img src="https://api.sofascore.app/api/v1/team/${m.aLogo.includes('_') ? m.aLogo : m.aLogo}/image" onerror="this.src='https://wiki.sofascore.app/images/d/d4/Placeholder_Team.png'" class="w-12 h-12 object-contain filter drop-shadow-lg">
                        <p class="text-[11px] font-black text-slate-800 uppercase tracking-tighter">${m.a}</p>
                    </div>
                </div>

                <div class="bg-sky-50 rounded-3xl p-5 flex justify-between items-center border border-sky-100">
                    <div>
                        <p class="text-[9px] text-sky-400 font-black uppercase tracking-widest">Sugestão VIP</p>
                        <p class="text-sm uppercase tracking-tight ${getTipStyle(m.tip)}">${m.tip}</p>
                    </div>
                    <div class="text-right flex flex-col gap-0.5">
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Odd</p>
                        <p class="text-2xl font-black text-slate-950 leading-none">@${m.odd}</p>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
