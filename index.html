<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro - Global & VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F8FAFC; color: #1e293b; }
        .vip-blur { filter: blur(4px); pointer-events: none; user-select: none; }
        .tab-active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; }
        .card-premium { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="pb-32">

    <div class="bg-white sticky top-0 z-50 shadow-sm border-b border-slate-100">
        <div class="flex justify-between items-center p-5">
            <h1 class="text-xl font-black italic uppercase">Palpite<span class="text-sky-500">Bet</span></h1>
            <button onclick="openVIP()" class="bg-amber-400 text-amber-900 px-4 py-1.5 rounded-full text-[10px] font-black animate-bounce shadow-lg shadow-amber-200">SEJA VIP</button>
        </div>
        <div class="flex gap-6 px-5 pb-3 overflow-x-auto no-scrollbar text-[11px] font-black uppercase tracking-widest text-slate-400">
            <span class="tab-active pb-1">Futebol</span>
            <span>Basquete</span>
            <span>Tênis</span>
            <span>E-Sports</span>
            <span>MMA</span>
        </div>
    </div>

    <main class="max-w-md mx-auto p-5 space-y-6">

        <section class="bg-white rounded-[32px] p-6 border border-sky-50 shadow-sm">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-lg">📈</span>
                <h3 class="text-[11px] font-black uppercase tracking-wider">Calculadora de Gestão</h3>
            </div>
            <div class="flex gap-2">
                <input id="vlr" type="number" placeholder="Banca R$" class="w-1/2 bg-slate-50 p-3 rounded-2xl text-xs outline-none border border-slate-100">
                <button onclick="calcBanca()" class="w-1/2 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest">Sugerir Stake</button>
            </div>
            <p id="resBanca" class="text-center mt-3 text-[10px] font-bold text-sky-600 hidden"></p>
        </section>

        <div class="bg-white rounded-[35px] p-6 border border-slate-100 shadow-sm relative">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[9px] font-black bg-slate-100 px-3 py-1 rounded-full uppercase">Brasileirão</span>
                <span class="text-[9px] font-black text-green-500">● LIVE</span>
            </div>
            <div class="flex justify-around items-center mb-6 font-bold text-sm">
                <span>Flamengo</span>
                <span class="text-slate-200 italic">vs</span>
                <span>Palmeiras</span>
            </div>
            <div class="bg-sky-50 p-4 rounded-2xl flex justify-between items-center border border-sky-100">
                <span class="text-[10px] font-black uppercase text-sky-600">Palpite:</span>
                <span class="font-black text-slate-900 uppercase text-xs">Ambos Marcam</span>
                <span class="font-black text-sky-500">@1.85</span>
            </div>
        </div>

        <div class="card-premium rounded-[35px] p-1 relative overflow-hidden">
            <div class="bg-white/5 backdrop-blur-sm p-6 rounded-[34px]">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[9px] font-black bg-amber-400 text-amber-900 px-3 py-1 rounded-full uppercase italic">Análise VIP PRO</span>
                    <span class="text-[10px] text-white/50 font-bold">Confiança: 98%</span>
                </div>
                
                <div class="vip-blur space-y-3">
                    <div class="h-4 bg-white/10 rounded w-3/4"></div>
                    <div class="h-4 bg-white/10 rounded w-1/2"></div>
                    <div class="h-10 bg-white/10 rounded w-full"></div>
                </div>

                <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
                    <p class="text-white font-black text-sm uppercase mb-4 tracking-tighter">Assine o plano mensal para desbloquear análises detalhadas de +10 esportes</p>
                    <button onclick="openVIP()" class="w-full bg-amber-400 text-amber-900 py-4 rounded-2xl font-black uppercase text-xs shadow-xl shadow-amber-500/20">Desbloquear Agora</button>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-5 z-50 rounded-t-[35px] shadow-2xl">
        <div class="flex flex-col items-center text-sky-500"><span class="text-2xl">🏟️</span><p class="text-[8px] font-black uppercase">Esportes</p></div>
        <div class="flex flex-col items-center text-slate-300"><span class="text-2xl">💎</span><p class="text-[8px] font-black uppercase">VIP</p></div>
        <div class="flex flex-col items-center text-slate-300"><span class="text-2xl">👤</span><p class="text-[8px] font-black uppercase">Perfil</p></div>
    </nav>

    <script>
        function calcBanca() {
            const v = document.getElementById('vlr').value;
            const res = document.getElementById('resBanca');
            if(v) {
                const stake = (v * 0.03).toFixed(2);
                res.innerHTML = `Sua entrada segura (3%): R$ ${stake}`;
                res.classList.remove('hidden');
            }
        }
        function openVIP() {
            alert("Redirecionando para o Checkout de Assinatura... (Aqui você coloca seu link de pagamento)");
        }
    </script>
</body>
</html>
