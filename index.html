<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 pb-24">

    <div class="bg-gradient-to-r from-pink-600 to-purple-600 text-white p-5 sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black italic">PALPITEBET</h1>
            <div class="flex gap-4"><span>🔍</span><span>👤</span></div>
        </div>
        <div class="flex gap-4 overflow-x-auto no-scrollbar text-[10px] font-bold uppercase opacity-90">
            <span>DOM 05.04</span><span>SEG 06.04</span><span>TER 07.04</span>
            <span class="border-b-2 border-white pb-1 text-white">HOJE 08.04</span>
            <span>QUI 09.04</span><span>SEX 10.04</span>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-pink-100">
            <div class="flex justify-between mb-2 text-[9px] font-bold text-gray-400">
                <span>PALPITE IA</span><span class="text-green-500 font-black">94% CONF.</span>
            </div>
            <h2 class="font-bold text-center text-slate-800 mb-3 text-lg">Real Madrid vs Man. City</h2>
            <div class="bg-pink-50 rounded-2xl p-4 flex justify-between items-center font-bold text-pink-700">
                <span class="text-sm">Mais de 2.5 Gols</span>
                <span class="text-xl text-slate-900">@1.72</span>
            </div>
        </div>

        <div class="space-y-2">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Resultados</h3>
                <span class="bg-red-500 text-white text-[9px] px-2 py-0.5 rounded-full animate-pulse">AO VIVO</span>
            </div>
            
            <div class="bg-white rounded-3xl shadow-md border border-gray-100 overflow-hidden" style="height: 700px;">
                <iframe src="https://m.flashscore.com.br/" width="100%" height="700" frameborder="0" style="margin-top: -50px;"></iframe>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 z-50 shadow-2xl">
        <div class="text-pink-600 flex flex-col items-center"><span class="text-xl">🏠</span><span class="text-[9px] font-bold">Hoje</span></div>
        <div class="text-gray-400 flex flex-col items-center"><span class="text-xl">📡</span><span class="text-[9px] font-bold">Ao Vivo</span></div>
        <div class="text-gray-400 flex flex-col items-center"><span class="text-xl">⭐</span><span class="text-[9px] font-bold">Favoritos</span></div>
        <div class="text-gray-400 flex flex-col items-center"><span class="text-xl">🏆</span><span class="text-[9px] font-bold">Ligas</span></div>
    </nav>

</body>
</html>
