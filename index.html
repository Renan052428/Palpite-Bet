<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #F8FAFC; color: #1e293b; overflow-x: hidden; }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 100, 255, 0.06); }
        .pix-btn { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .team-logo { width: 45px; height: 45px; object-fit: contain; background: white; border-radius: 50%; padding: 4px; border: 1px solid #f1f5f9; }
        
        /* Transição da Página de Detalhes */
        #game-details {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #F8FAFC; z-index: 100;
            overflow-y: auto;
        }
        .tab-active { border-bottom: 3px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body class="pb-24">

    <div id="main-content">
        <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-100 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-2xl font-black italic text-slate-900 uppercase">Palpite<span class="text-sky-500">Bet</span></h1>
                <p class="text-[9px] font-black text-sky-400 uppercase tracking-widest mt-1">Estatísticas & VIP</p>
            </div>
            <a href="https://pay.kiwify.com.br/mj9n838" class="pix-btn text-white px-5 py-2.5 rounded-2xl text-[10px] font-black shadow-lg">VIP R$ 9,99</a>
        </header>

        <nav class="bg-white/90 backdrop-blur-md sticky top-[73px] z-40 overflow-x-auto no-scrollbar flex gap-4 px-6 py-4 border-b border-slate-50">
            <button class="bg-sky-500 text-white text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">⚽ Futebol</button>
            <button class="bg-slate-100 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🏀 NBA</button>
            <button class="bg-slate-100 text-slate-400 text-[10px] font-black uppercase px-6 py-2 rounded-full whitespace-nowrap">🥊 MMA</button>
        </nav>

        <main class="max-w-md mx-auto p-5 space-y-6">
            <div id="games-feed" class="space-y-4">
                </div>
        </main>
    </div>

    <div id="game-details">
        <div class="bg-slate-900 text-white p-4 flex items-center gap-4">
            <button onclick="closeDetails()" class="text-2xl">←</button>
            <div class="flex items-center gap-2">
                <span id="det-sport-icon">⚽</span>
                <span id="det-league" class="text-xs font-bold uppercase tracking-tight"></span>
            </div>
        </div>

        <div class="bg-white p-8 flex justify-between items-center border-b border-slate-100">
            <div class="flex flex-col items-center gap-2 flex-1">
                <img id="det-logo-h" src="" class="w-16 h-16 object-contain">
                <span id="det-name-h" class="text-xs font-black text-center uppercase"></span>
            </div>
            <div class="flex flex-col items-center flex-1">
                <span class="text-[10px] text-slate-400 font-bold mb-1">09.04.2026 16:00</span>
                <span class="text-3xl font-black text-slate-900 italic">0 - 0</span>
                <span class="text-[10px] text-red-500 font-black mt-1">NÃO INICIADO</span>
            </div>
            <div class="flex flex-col items-center gap-2 flex-1">
                <img id="det-logo-a" src="" class="w-16 h-16 object-contain">
                <span id="det-name-a" class="text-xs font-black text-center uppercase"></span>
            </div>
        </div>

        <div class="bg-white flex justify-around border-b border-slate-100 overflow-x-auto no-scrollbar">
            <button class="px-4 py-4 text-[10px] font-black uppercase tab-active">Sumário</button>
            <button class="px-4 py-4 text-[10px] font-black uppercase text-slate-400">Estatísticas</button>
            <button class="px-4 py-4 text-[10px] font-black uppercase text-slate-400">Formações</button>
            <button class="px-4 py-4 text-[10px] font-black uppercase text-slate-400">Odds</button>
        </div>

        <div class="p-5 space-y-4">
            <div class="text-[10px] font-black text-slate-400 uppercase mb-2 italic">Mercados Recomendados AI</div>
            
            <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div>
                    <p class="text-[8px] text-sky-500 font-black uppercase">🚩 Escanteios</p>
                    <p class="text-[11px] font-black uppercase">Mais de 9.5 Cantos</p>
                </div>
                <div class="text-right">
                    <p class="text-[8px] text-slate-300 font-black">ODD</p>
                    <p class="text-xl font-black text-slate-900">@1.85</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div>
                    <p class="text-[8px] text-sky-500 font-black uppercase">🎯 Finalizações</p>
                    <p class="text-[11px] font-black uppercase">Time da Casa +4.5 Chutes ao Gol</p>
                </div>
                <div class="text-right">
                    <p class="text-[8px] text-slate-300 font-black">ODD</p>
                    <p class="text-xl font-black text-slate-900">@2.10</p>
                </div>
            </div>

            <a href="https://pay.kiwify.com.br/mj9n838" class="block w-full bg-slate-900 text-white text-center py-4 rounded-2xl font-black uppercase text-[10px] mt-6 shadow-xl">
                Liberar Todas Estatísticas (VIP)
            </a>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-sky-50 flex justify-around p-6 z-50 rounded-t-[40px] shadow-2xl">
        <div class="flex flex-col items-center gap-1 text-sky-600 font-black text-[9px] uppercase"><span class="text-2xl">⚡</span>Tips</div>
        <a href="https://pay.kiwify.com.br/mj9n838" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase"><span class="text-2xl">💰</span>VIP Pix</a>
        <div class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase"><span class="text-2xl">👤</span>Perfil</div>
    </nav>

    <script>
        const matches = [
            { id: 1, h: "Real Madrid", a: "Man City", l: "Champions League", idH: "86", idA: "50", o: "1.95" },
            { id: 2, h: "Flamengo", a: "Palmeiras", l: "Brasileirão", idH: "5981", idA: "1053", o: "1.80" }
        ];

        const getLogo = (id) => `https://api.sofascore.app/api/v1/team/${id}/image`;

        // Renderiza Home
        document.getElementById('games-feed').innerHTML = matches.map(m => `
            <div onclick="openDetails(${m.id})" class="bg-white rounded-[35px] p-6 border border-sky-50 card-shadow active:scale-95 transition-all">
                <p class="text-[8px] font-black text-slate-200 uppercase tracking-widest text-center mb-4 italic">${m.l}</p>
                <div class="flex items-center justify-between">
                    <div class="flex flex-col items-center flex-1">
                        <img src="${getLogo(m.idH)}" class="team-logo">
                        <span class="text-[10px] font-black uppercase mt-2">${m.h}</span>
                    </div>
                    <span class="text-[10px] font-black text-slate-100">VS</span>
                    <div class="flex flex-col items-center flex-1">
                        <img src="${getLogo(m.idA)}" class="team-logo">
                        <span class="text-[10px] font-black uppercase mt-2">${m.a}</span>
                    </div>
                </div>
                <div class="bg-sky-50 rounded-2xl p-3 mt-4 text-center">
                    <span class="text-[9px] font-black text-sky-500 uppercase">Ver Análise Completa →</span>
                </div>
            </div>
        `).join('');

        function openDetails(id) {
            const m = matches.find(item => item.id === id);
            document.getElementById('det-league').innerText = m.l;
            document.getElementById('det-name-h').innerText = m.h;
            document.getElementById('det-name-a').innerText = m.a;
            document.getElementById('det-logo-h').src = getLogo(m.idH);
            document.getElementById('det-logo-a').src = getLogo(m.idA);
            
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('game-details').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function closeDetails() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('game-details').style.display = 'none';
        }
    </script>
</body>
</html>
