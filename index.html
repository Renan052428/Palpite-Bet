<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-shadow { box-shadow: 0 15px 35px -5px rgba(0, 150, 255, 0.08); }
        .badge-shadow { box-shadow: 0 5px 15px -3px rgba(0, 150, 255, 0.2); }
    </style>
</head>
<body class="bg-slate-50 pb-24 text-slate-900">

    <header class="bg-white p-7 sticky top-0 z-50 border-b border-sky-100 rounded-b-[40px] shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] font-black text-sky-500 uppercase tracking-[2px]">Inteligência Automática</p>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase text-slate-900">Palpite<span class="text-sky-500">Bet</span></h1>
            </div>
            <div class="flex gap-2.5">
                <div class="bg-sky-50 p-3 rounded-2xl border border-sky-100 text-sky-500">🔍</div>
                <div class="bg-slate-900 p-3 rounded-2xl text-white font-black text-xs">AI Pro</div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-6">
        
        <div class="flex justify-between items-center px-1.5">
            <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Dicas da Rodada</h3>
            <span class="flex items-center gap-1.5 text-[11px] text-sky-600 font-bold bg-sky-100 px-4 py-1.5 rounded-full badge-shadow">
                <span class="w-2 h-2 bg-sky-500 rounded-full animate-pulse"></span> ● LIVE DATA
            </span>
        </div>

        <div id="prediction-list" class="space-y-6">
            </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 flex justify-around p-5 z-50 rounded-t-[32px] shadow-[0_-15px_40px_rgba(0,100,200,0.06)]">
        <div class="flex flex-col items-center gap-1 text-sky-600">
            <span class="text-2xl">🏠</span><p class="text-[10px] font-black uppercase tracking-tighter">Início</p>
        </div>
        <div class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-2xl">📡</span><p class="text-[10px] font-black uppercase tracking-tighter">Live</p>
        </div>
        <div class="flex flex-col items-center gap-1 text-slate-300">
            <span class="text-2xl">🏆</span><p class="text-[10px] font-black uppercase tracking-tighter">Ligas</p>
        </div>
    </nav>

    <script>
        // Função para definir as cores e pesos baseados no tipo de palpite
        function getStyleByTip(tip) {
            const lowTip = tip.toLowerCase();
            if (lowTip.includes('vitória')) return 'text-green-600 font-bold';
            if (lowTip.includes('ambos marcam')) return 'text-black font-black';
            return 'text-sky-600 font-medium';
        }

        // Função para carregar escudos automáticos de alta qualidade (Motor de Busca)
        function getHighResLogo(teamName) {
            // Este motor busca escudos oficiais com fundo transparente
            return `https://logo.clearbit.com/${teamName.toLowerCase().replace(/\s+/g, '')}.com`;
        }
        
        // Fallback: Se o logo de cima falhar (para times menos famosos), usa este motor secundário
        function getFallbackLogo(teamName) {
            return `https://img.favpng.com/v2/search/${teamName.toLowerCase().replace(/\s+/g, '-')}-logo.html`;
        }

        // LISTA DE JOGOS (Mude os nomes dos times aqui)
        const matches = [
            { home: "Barcelona", away: "Real Madrid", league: "La Liga", tip: "Vitória Casa", odd: "1.90", conf: "94%" },
            { home: "Man. City", away: "Liverpool", league: "Premier League", tip: "Ambos Marcam", odd: "1.62", conf: "91%" },
            { home: "Palmeiras", away: "Flamengo", league: "Brasileirão", tip: "Vitória Mandante", odd: "1.85", conf: "88%" },
            { home: "Arsenal", away: "Bayern", league: "Champions", tip: "Ambos Marcam", odd: "1.70", conf: "94%" }
        ];

        document.getElementById('prediction-list').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-8 border border-sky-50 card-shadow relative overflow-hidden active:scale-[0.98] transition-all">
                <div class="absolute top-0 right-0 bg-gradient-to-l from-sky-500 to-sky-600 text-white text-[9px] px-5 py-2.5 rounded-bl-3xl font-black italic tracking-widest">${m.conf} CONF.</div>
                
                <p class="text-[10px] font-bold text-slate-300 uppercase mb-6 tracking-[3px]">${m.league}</p>
                
                <div class="flex items-center justify-between gap-3 mb-8 px-2">
                    <div class="flex flex-col items-center gap-3 flex-1 text-center">
                        <img src="${getHighResLogo(m.home)}" onerror="this.src='https://wiki.sofascore.app/images/d/d4/Placeholder_Team.png'" class="w-12 h-12 object-contain filter drop-shadow-lg">
                        <p class="text-xs font-bold text-slate-800 leading-snug">${m.home}</p>
                    </div>
                    <span class="text-sm font-black text-slate-100 italic">VS</span>
                    <div class="flex flex-col items-center gap-3 flex-1 text-center">
                        <img src="${getHighResLogo(m.away)}" onerror="this.src='https://wiki.sofascore.app/images/d/d4/Placeholder_Team.png'" class="w-12 h-12 object-contain filter drop-shadow-lg">
                        <p class="text-xs font-bold text-slate-800 leading-snug">${m.away}</p>
                    </div>
                </div>

                <div class="bg-sky-50/50 rounded-3xl p-5 flex justify-between items-center border border-sky-100 shadow-inner">
                    <div class="flex flex-col gap-0.5">
                        <p class="text-[9px] text-sky-400 font-bold uppercase tracking-widest">Sugestão VIP</p>
                        <p class="text-base uppercase ${getStyleByTip(m.tip)}">${m.tip}</p>
                    </div>
                    <div class="text-right flex flex-col gap-0.5">
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Cotação</p>
                        <p class="text-2xl font-black text-slate-950">@${m.odd}</p>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
