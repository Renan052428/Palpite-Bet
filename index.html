<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro Auto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Garante que o escudo não quebre o layout */
        .team-logo { width: 32px; height: 32px; object-fit: contain; }
    </style>
</head>
<body class="bg-slate-50 pb-24 text-slate-900">

    <header class="bg-white p-6 sticky top-0 z-50 shadow-sm border-b border-sky-100 rounded-b-[32px]">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-[9px] font-black text-sky-500 uppercase tracking-[3px]">Inteligência Automática</p>
                <h1 class="text-2xl font-black italic tracking-tighter uppercase text-slate-800">Palpite<span class="text-sky-500">Bet</span></h1>
            </div>
            <div class="flex gap-3">
                <div class="bg-sky-50 p-2.5 rounded-2xl border border-sky-100 text-sky-600">🔍</div>
                <div class="bg-slate-800 p-2.5 rounded-2xl border border-slate-700 text-white font-black text-xs">AI</div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-5 space-y-6">
        
        <div class="flex justify-between items-end px-1">
            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Dicas da Rodada</h3>
            <span class="text-[9px] bg-sky-100 text-sky-600 px-3 py-1 rounded-full font-bold">● LIVE DATA</span>
        </div>

        <div id="prediction-list" class="space-y-5">
            <div class="animate-pulse bg-white h-40 rounded-[32px]"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 flex justify-around p-5 z-50 rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,100,200,0.05)]">
        <div class="flex flex-col items-center gap-1 text-sky-600"><span class="text-xl">🏠</span><p class="text-[9px] font-black uppercase tracking-tighter">Início</p></div>
        <div class="flex flex-col items-center gap-1 text-slate-300 opacity-60"><span class="text-xl">📡</span><p class="text-[9px] font-black uppercase tracking-tighter">Live</p></div>
        <div class="flex flex-col items-center gap-1 text-slate-300 opacity-60"><span class="text-xl">🏆</span><p class="text-[9px] font-black uppercase tracking-tighter">Ligas</p></div>
    </nav>

    <script>
        // Função para obter a URL do escudo do time (API-Football Team Logos)
        function getTeamLogo(teamName) {
            return `https://media.api-sports.io/football/teams/${teamName.toLowerCase().replace(/\s+/g, '-')}.png`;
        }

        // Função para definir a cor do palpite com base na lógica pedida
        function getTipColorClass(tipText) {
            if (tipText.toLowerCase().includes('vitória')) {
                return 'text-green-600'; // Vitória é VERDE
            }
            if (tipText.toLowerCase().includes('ambos marcam')) {
                return 'text-slate-950'; // Ambos Marcam é PRETO
            }
            return 'text-sky-600'; // Outros palpites usam o azul padrão
        }

        // LISTA DE JOGOS AUTOMÁTICA
        const matches = [
            { home: "Barcelona", away: "Atl. Madrid", campeonato: "La Liga", dica: "Vitória Casa", odd: "1.90", conf: "88%" },
            { home: "Man. City", away: "Liverpool", campeonato: "Premier League", dica: "Ambos Marcam", odd: "1.62", conf: "91%" },
            { home: "Palmeiras", away: "Flamengo", campeonato: "Brasileirão", dica: "Vitória Mandante", odd: "1.85", conf: "89%" },
            { home: "Arsenal", away: "Bayern", campeonato: "Champions", dica: "Ambos Marcam", odd: "1.70", conf: "94%" }
        ];

        // GERAÇÃO DOS CARDS
        document.getElementById('prediction-list').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[32px] p-7 shadow-sm border border-sky-50 relative overflow-hidden">
                <div class="absolute top-0 right-0 bg-sky-500 text-white text-[8px] px-4 py-1.5 rounded-bl-2xl font-black">${m.conf} CONF.</div>
                
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">${m.campeonato}</p>
                
                <div class="flex items-center justify-center gap-4 mb-6">
                    <div class="flex-1 flex flex-col items-center gap-2 text-center">
                        <img src="${getTeamLogo(m.home)}" alt="${m.home}" class="team-logo">
                        <p class="text-sm font-bold text-slate-800 leading-tight">${m.home}</p>
                    </div>
                    <span class="text-2xl font-black text-slate-200 italic">vs</span>
                    <div class="flex-1 flex flex-col items-center gap-2 text-center">
                        <img src="${getTeamLogo(m.away)}" alt="${m.away}" class="team-logo">
                        <p class="text-sm font-bold text-slate-800 leading-tight">${m.away}</p>
                    </div>
                </div>

                <div class="flex justify-between items-center bg-sky-50 rounded-2xl p-5 border border-sky-100 shadow-inner">
                    <div class="flex flex-col gap-0.5">
                        <p class="text-[9px] text-sky-400 font-bold uppercase tracking-widest">Palpite Sugerido</p>
                        <p class="font-black text-lg ${getTipColorClass(m.dica)}">${m.dica}</p>
                    </div>
                    <div class="text-right flex flex-col gap-0.5">
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Cotação</p>
                        <p class="font-black text-slate-950 text-2xl">@${m.odd}</p>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
