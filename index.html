<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PalpiteBet Pro - VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>

        .pix-btn { background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Garante que o escudo apareça centralizado e visível */
        .img-container { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: white; border-radius: 12px; }
    </style>
</head>
<body class="pb-32">

    <header class="bg-white p-6 sticky top-0 z-50 border-b border-sky-100 rounded-b-[40px] shadow-sm flex justify-between items-center">
        <div class="flex flex-col">
            <h1 class="text-2xl font-black italic text-slate-900 uppercase leading-none">Palpite<span class="text-sky-500">Bet</span></h1>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div id="games-feed" class="space-y-6">

        <a href="https://pay.kiwify.com.br/mj9n838" class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase"><span>💰</span>VIP PIX</a>
        <div class="flex flex-col items-center gap-1 text-slate-300 font-black text-[9px] uppercase"><span>👤</span>PAINEL</div>
    </nav>

    <script>
        // Usei uma URL de imagem que o GitHub Pages aceita melhor
        const getLogo = (id) => `https://api.sofascore.app/api/v1/team/${id}/image`;

        const matches = [
            { h: "Real Madrid", a: "Man. City", l: "Champions League", t: "Vitória Casa", o: "1.95", idH: "86", idA: "50" },
            { h: "Flamengo", a: "Palmeiras", l: "Brasileirão", t: "Ambos Marcam", o: "1.80", idH: "5981", idA: "1053" },
            { h: "Arsenal", a: "Bayern", l: "Champions League", t: "Vitória Casa", o: "1.72", idH: "42", idA: "81" },
            { h: "Lakers", a: "Warriors", l: "NBA", t: "Vencedor: Lakers", o: "1.85", idH: "3427", idA: "3428" },
            { h: "Chelsea", a: "Man. Utd", l: "Premier League", t: "Ambos Marcam", o: "1.65", idH: "38", idA: "35" },
            { h: "Barcelona", a: "PSG", l: "Champions League", t: "Vitória Casa", o: "2.10", idH: "83", idA: "524" },
            { h: "Liverpool", a: "Real Madrid", l: "Champions League", t: "Vitória Visitante", o: "2.35", idH: "44", idA: "86" },
            { h: "Atlético-MG", a: "River Plate", l: "Libertadores", t: "Vitória Casa", o: "1.90", idH: "1029", idA: "1108" },

        ];

        document.getElementById('games-feed').innerHTML = matches.map(m => `
            <div class="bg-white rounded-[40px] p-8 border border-sky-50 card-shadow">
                <p class="text-[9px] font-black text-slate-200 uppercase mb-6 tracking-[3px] text-center italic">${m.l}</p>
                <div class="flex items-center justify-between mb-8">
                    <div class="flex flex-col items-center gap-3 flex-1">
                        <div class="img-container">

                </div>
                <div class="bg-sky-50 rounded-3xl p-5 flex justify-between items-center border border-sky-100">
                    <div class="flex flex-col">
                        <p class="text-[8px] text-sky-400 font-black uppercase mb-1">Palpite AI</p>
                        <p class="text-[11px] uppercase font-black ${m.t.includes('Vitória') ? 'text-green-600' : 'text-slate-900'}">${m.t}</p>
                    </div>
                    <span class="text-2xl font-black text-slate-900 tracking-tighter leading-none">@${m.o}</span>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
