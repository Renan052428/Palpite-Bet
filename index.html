<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PALPITEBET | OFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F2F5F8; color: #334155; margin: 0; padding: 0; }
        .scroll-x { overflow-x: auto; display: flex; gap: 10px; padding: 15px; scrollbar-width: none; }
        .sport-btn { min-width: 105px; background: white; padding: 12px; border-radius: 14px; text-align: center; border: 1px solid #e2e8f0; font-size: 12px; font-weight: 700; flex-shrink: 0; cursor: pointer; }
        .sport-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        .league-row { background: #E5E9F0; padding: 10px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d1d5db; }
        .league-txt { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #475569; display: flex; align-items: center; gap: 8px; }
        .game-card { background: white; padding: 18px; display: flex; align-items: center; border-bottom: 1px solid #f1f5f9; min-height: 100px; }
        .team-logo { width: 24px; height: 24px; object-fit: contain; }
        .teams-area { flex: 1; padding: 0 15px; }
        .row-team { display: flex; align-items: center; justify-content: space-between; font-size: 15px; margin: 4px 0; font-weight: 700; color: #1e293b; }
        .btn-analisar { background: #f8fafc; border: 1px solid #e2e8f0; color: #3b82f6; font-size: 11px; padding: 10px 14px; border-radius: 10px; min-width: 120px; text-align: center; font-weight: 800; text-transform: uppercase; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0 35px; border-top: 1px solid #e2e8f0; z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.06); }
        .nav-link { text-align: center; font-size: 10px; color: #94a3b8; font-weight: 800; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .vip-button { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 12px; font-weight: 900; font-size: 11px; text-align: center; line-height: 1.2; }
    </style>
</head>
<body class="pb-44">

    <header class="p-6 bg-white flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-[900] italic tracking-tighter uppercase leading-none text-[#1e293b]">PALPITE<span class="text-blue-600">BET</span></h1>
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mt-1">Global Intelligence</p>
        </div>
        <div onclick="location.href='https://mpago.la/16fRczK'" class="vip-button cursor-pointer">
            ATIVAR VIP <br> <span class="text-[9px] opacity-80 font-bold">R$ 9,99</span>
        </div>
    </header>

    <div class="scroll-x">
        <div class="sport-btn active" onclick="switchTab('futebol', this)">⚽ FUTEBOL</div>
        <div class="sport-btn" onclick="switchTab('basquete', this)">🏀 BASQUETE</div>
    </div>

    <div class="px-5 mb-6">
        <div class="bg-[#0f172a] rounded-[30px] p-6 shadow-xl">
            <div class="flex justify-between items-center mb-5">
                <p class="text-blue-400 text-[10px] font-black uppercase tracking-widest flex items-center gap-2">PROCESSAMENTO VIA SATÉLITE</p>
                <span class="text-emerald-400 text-[11px] font-black italic">96,4% ACERTO</span>
            </div>
            <div class="flex gap-3">
                <input type="text" placeholder="Código do bilhete..." class="flex-1 bg-white/10 border border-white/10 rounded-2xl p-4 text-sm text-white outline-none">
                <button onclick="location.href='https://mpago.la/16fRczK'" class="bg-blue-600 text-white px-6 rounded-2xl text-[11px] font-black uppercase">Analisar</button>
            </div>
        </div>
    </div>

    <main id="main-content">
        <div id="futebol" class="tab-content active">
            <div class="league-row"><div class="league-txt">🇧🇷 BRASIL: BRASILEIRÃO</div><span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-md font-black uppercase">LIVE</span></div>
            <div class="game-card">
                <div class="text-slate-900 font-black text-[12px] w-12 italic">54'</div>
                <div class="teams-area">
                    <div class="row-team text-emerald-600"><div class="flex items-center gap-3"><img src="https://s.glbimg.com/es/sde/f/equipes/2013/12/16/atletico_pr_60x60.png" class="team-logo"> Athletico-PR</div><span>2</span></div>
                    <div class="row-team"><div class="flex items-center gap-3"><img src="https://s.glbimg.com/es/sde/f/equipes/2015/05/06/chapecoense_60x60.png" class="team-logo"> Chapecoense</div><span>0</span></div>
                </div>
                <div class="btn-analisar">Analisar</div>
            </div>
            </div>
    </main>

    <nav class="nav-bottom">
        <div class="nav-link">🏠<br>Hoje</div>
        <div class="nav-link">📡<br>Ao Vivo</div>
        <div onclick="location.href='https://wa.me/5511999999999'" class="nav-link" style="color:#3b82f6;">👤<br>Cadastro</div>
        <div class="nav-link">🏆<br>Ligas</div>
    </nav>

    <script>
        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }
    </script>
</body>
</html>
