<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PALPITE-BET | FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #F2F5F8; color: #334155; margin: 0; padding: 0; }
        
        /* Barra de Esportes Horizontal */
        .scroll-x { overflow-x: auto; display: flex; gap: 10px; padding: 15px; scrollbar-width: none; -ms-overflow-style: none; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .sport-btn { min-width: 110px; background: white; padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; font-size: 11px; font-weight: 700; flex-shrink: 0; }
        .sport-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }

        /* Ligas e Cards */
        .league-row { background: #E5E9F0; padding: 8px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d1d5db; }
        .league-txt { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #475569; display: flex; align-items: center; gap: 8px; }
        .game-card { background: white; padding: 15px 18px; display: flex; align-items: center; border-bottom: 1px solid #f1f5f9; min-height: 95px; }
        
        /* ESCUDOS CORRIGIDOS (Fallback Automático) */
        .team-logo { width: 22px; height: 22px; object-fit: contain; border-radius: 4px; }
        
        .teams-area { flex: 1; padding: 0 15px; }
        .row-team { display: flex; align-items: center; justify-content: space-between; font-size: 14px; margin: 4px 0; font-weight: 600; }
        .btn-analisar { background: #f8fafc; border: 1px solid #e2e8f0; color: #3b82f6; font-size: 10px; padding: 8px 12px; border-radius: 8px; min-width: 110px; text-align: center; font-weight: 700; text-transform: uppercase; text-decoration: none; }

        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0 30px; border-top: 1px solid #e2e8f0; z-index: 1000; }
    </style>
</head>
<body class="pb-32">

    <header class="p-5 bg-white flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-2xl font-bold italic tracking-tighter uppercase leading-none">PALPITE<span class="text-blue-600">BET</span></h1>
            <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-1">Global Intelligence</p>
        </div>
        <a href="https://mpago.la/16fRczK" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase text-center">
            Ativar VIP <br> <span class="text-[8px] opacity-70">R$ 9,99</span>
        </a>
    </header>

    <div class="scroll-x">
        <div class="sport-btn active">⚽ Futebol</div>
        <div class="sport-btn">🏀 Basquete</div>
        <div class="sport-btn">🎾 Tênis</div>
        <div class="sport-btn">🥊 MMA</div>
        <div class="sport-btn">🏐 Vôlei</div>
        <div class="sport-btn">🎮 E-Sports</div>
    </div>

    <div class="px-5 mb-4">
        <div class="bg-[#12192c] rounded-3xl p-5">
            <div class="flex justify-between items-center mb-4">
                <p class="text-blue-400 text-[9px] font-bold uppercase">📡 Processamento via Satélite</p>
                <span class="text-emerald-400 text-[10px] font-bold">96,4% ACERTO</span>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Código do bilhete..." class="flex-1 bg-white/5 border border-white/10 rounded-xl p-3 text-xs text-white outline-none">
                <button class="bg-blue-600 text-white px-5 rounded-xl text-[10px] font-bold uppercase">Analisar</button>
            </div>
        </div>
    </div>

    <div class="bg-white flex justify-between px-8 border-b border-slate-100 py-3 mb-2">
        <div class="text-center opacity-30"> <div class="text-[7px] font-bold uppercase">Sáb</div> <div class="text-[9px] font-bold">11.04</div> </div>
        <div class="text-center border-b-2 border-red-500 pb-1"> <div class="text-[7px] text-red-500 font-bold uppercase">Hoje</div> <div class="text-[9px] text-red-500 font-bold">12.04</div> </div>
        <div class="text-center"> <div class="text-[7px] font-bold uppercase">Seg</div> <div class="text-[9px] font-bold">13.04</div> </div>
        <div class="text-center"> <div class="text-[7px] font-bold uppercase">Ter</div> <div class="text-[9px] font-bold">14.04</div> </div>
    </div>

    <main>
        <script>
            const ligas = [
                {n: "🇧🇷 Brasil: Brasileirão", t1: "Athletico-PR", i1: "1967", t2: "Chapecoense", i2: "1981", s1: "2", s2: "0", l: "LIVE"},
                {n: "🇩🇪 Alemanha: Bundesliga", t1: "FC Köln", i1: "2674", t2: "Werder Bremen", i2: "2533", s1: "2", s2: "1", l: "83'"},
                {n: "🇪🇸 Espanha: La Liga", t1: "Real Madrid", i1: "2817", t2: "Barcelona", i2: "2816", s1: "-", s2: "-", l: "21:00"},
                {n: "🇬🇧 Inglaterra: Premier", t1: "Man. City", i1: "17", t2: "Liverpool", i2: "31", s1: "-", s2: "-", l: "19:00"},
                {n: "🇫🇷 França: Ligue 1", t1: "PSG", i1: "1647", t2: "Lyon", i2: "1631", s1: "-", s2: "-", l: "20:30"},
                {n: "🇮🇹 Itália: Serie A", t1: "Juventus", i1: "2697", t2: "Milan", i2: "2714", s1: "-", s2: "-", l: "HOJE"},
                {n: "🇦迷 Argentina: Liga", t1: "Boca Juniors", i1: "2026", t2: "River Plate", i2: "2021", s1: "-", s2: "-", l: "22:00"},
                {n: "🇵🇹 Portugal: Liga", t1: "Benfica", i1: "3006", t2: "Porto", i2: "3002", s1: "1", s2: "1", l: "LIVE"},
                {n: "🇧🇷 Brasil: Série B", t1: "Santos", i1: "1968", t2: "Sport", i2: "1957", s1: "-", s2: "-", l: "AMANHÃ"},
                {n: "🇳🇱 Holanda: Eredivisie", t1: "Ajax", i1: "2352", t2: "PSV", i2: "2339", s1: "-", s2: "-", l: "FINALIZADO"}
            ];

            // Injetar os jogos via Loop para garantir que a barra seja infinita
            ligas.forEach(j => {
                document.write(`
                    <div class="league-row"><div class="league-txt">${j.n}</div><span class="bg-red-500 text-white text-[9px] px-2 py-0.5 rounded font-bold uppercase">${j.l}</span></div>
                    <div class="game-card">
                        <div class="text-black font-bold text-[11px] w-10">⏱️</div>
                        <div class="teams-area">
                            <div class="row-team"><div class="flex items-center gap-2">
                                <img src="https://api.sofascore.app/api/v1/team/${j.i1}/image" class="team-logo" onerror="this.src='https://www.fifaindex.com/static/FIFA24/images/crest/25/light/1.png'"> ${j.t1}</div><span>${j.s1}</span></div>
                            <div class="row-team"><div class="flex items-center gap-2">
                                <img src="https://api.sofascore.app/api/v1/team/${j.i2}/image" class="team-logo" onerror="this.src='https://www.fifaindex.com/static/FIFA24/images/crest/25/light/2.png'"> ${j.t2}</div><span>${j.s2}</span></div>
                        </div>
                        <a href="https://mpago.la/16fRczK" class="btn-analisar">Analisar</a>
                    </div>
                `);
            });
            // Duplicar a lista para forçar a rolagem longa
            ligas.forEach(j => {
                document.write(`
                    <div class="league-row"><div class="league-txt">${j.n}</div><span class="bg-slate-300 text-slate-600 text-[9px] px-2 py-0.5 rounded font-bold uppercase">OUTRO</span></div>
                    <div class="game-card">
                        <div class="text-black font-bold text-[11px] w-10">--</div>
                        <div class="teams-area">
                            <div class="row-team"><div class="flex items-center gap-2">
                                <img src="https://api.sofascore.app/api/v1/team/${j.i1}/image" class="team-logo"> ${j.t1}</div><span>-</span></div>
                            <div class="row-team"><div class="flex items-center gap-2">
                                <img src="https://api.sofascore.app/api/v1/team/${j.i2}/image" class="team-logo"> ${j.t2}</div><span>-</span></div>
                        </div>
                        <a href="https://mpago.la/16fRczK" class="btn-analisar">Analisar</a>
                    </div>
                `);
            });
        </script>
    </main>

    <nav class="nav-bottom">
        <a href="#" class="text-center text-[9px] font-bold text-slate-800 uppercase no-underline">🏠<br>Hoje</a>
        <a href="#" class="text-center text-[9px] font-bold text-slate-400 uppercase no-underline">📡<br>Ao Vivo</a>
        <a href="#" class="text-center text-[9px] font-bold text-slate-400 uppercase no-underline">👤<br>Cadastro</a>
        <a href="#" class="text-center text-[9px] font-bold text-slate-400 uppercase no-underline">🏆<br>Ligas</a>
    </nav>

</body>
</html>
